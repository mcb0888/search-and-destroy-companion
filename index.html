00%;border:1px solid var(--line);background:#08110d;color:var(--text);border-radius:12px;padding:13px}.notearea{min-height:180px}.term-list{display:grid;gap:8px;margin-top:10px}.term-row{border:1px solid var(--line);background:var(--panel);border-radius:13px;padding:13px;text-align:left;color:var(--text)}.term-row strong{display:block}.term-row small{color:var(--muted)}.compare{display:grid;grid-template-columns:1fr 1fr;gap:8px}.compare>div{border:1px solid var(--line);background:var(--panel);border-radius:13px;padding:11px}.compare strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}.compare .bad strong{color:#ffadb2}.compare .good strong{color:var(--green2)}.manual-list{display:grid;gap:8px;margin-top:10px}.bottom{position:fixed;z-index:50;left:0;right:0;bottom:0;background:rgba(7,16,12,.98);border-top:1px solid var(--line);padding:7px max(7px,env(safe-area-inset-right)) calc(7px + env(safe-area-inset-bottom)) max(7px,env(safe-area-inset-left));display:flex;justify-content:center}.bottom-inner{width:min(720px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:3px}.nav{border:0;background:transparent;color:var(--muted);padding:7px 2px;font-size:10px}.nav b{display:block;font-size:19px}.nav.active{color:var(--green)}.toast{position:fixed;left:50%;bottom:94px;transform:translateX(-50%);z-index:90;background:#243129;border:1px solid var(--line);padding:10px 14px;border-radius:12px;display:none;max-width:90%;text-align:center}a{color:var(--green2)}@media(min-width:640px){.button-list.two{grid-template-columns:1fr 1fr}.hero h1{font-size:34px}}@media(max-width:460px){.compare{grid-template-columns:1fr}.now span{font-size:18px}.brand small{max-width:220px}.iconbtn,.ghost,.primary,.sharebtn{padding:9px 10px}}

<body>
<div class="shell">
<header><div class="brand"><div><strong>Search &amp; Destroy Companion</strong><small>Beginner guide · Quick help · Game-term dictionary</small></div><div class="header-actions"><button class="iconbtn" id="updateBtn" hidden>Update</button><button class="iconbtn" id="installBtn" hidden>Install</button><button class="iconbtn" id="aboutBtn">i</button></div></div></header>
<main id="main"></main>
</div>

<button class="nav" data-root="home"><b>⌂</b>Start</button>

<script>
const MANUAL=window.APP_DATA,LEARN=window.LEARN_DATA,FIGHTS=window.FIGHT_DATA,main=document.getElementById('main');
let deferredInstall=null,waitingWorker=null;
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const slug=s=>String(s).toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1800)};
const terms=[...LEARN.terms];
(MANUAL.dictionary||[]).forEach(d=>{const id=slug(d.term);if(!terms.some(t=>t.id===id))terms.push({id,term:d.term,definition:d.definition})});
const termById=id=>terms.find(t=>t.id===decodeURIComponent(id))||terms.find(t=>slug(t.term)===decodeURIComponent(id));
const quickById=id=>LEARN.quick.find(x=>x.id===id),lessonById=id=>LEARN.lessons.find(x=>x.id===id),fightById=id=>FIGHTS.find(x=>x.id===id);
function go(path){location.hash='#/'+path}
function route(){return location.hash.replace(/^#\/?/,'')||'home'}
function rootOf(r){return r.split('/')[0]||'home'}
function setNav(root){document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.root===root))}
function shareButton(){return `<button class="sharebtn" data-share>Copy page link</button>`}
function bindShare(){const b=document.querySelector('[data-share]');if(b)b.onclick=async()=>{try{await navigator.clipboard.writeText(location.href);toast('Page link copied')}catch{prompt('Copy this link:',location.href)}}}
function termNote(ids=[]){const found=[...new Set(ids)].map(termById).filter(Boolean);if(!found.length)return'';return `<div class="term-note"><p><strong>Game terms on this page.</strong> Tap a term for its dictionary definition.</p><div class="term-chips">${found.map(t=>`<a class="term-chip" href="#/term/${encodeURIComponent(t.id)}">${esc(t.term)}</a>`).join('')}</div></div>`}
function termsInText(text=''){const s=text.toLowerCase();return terms.filter(t=>s.includes(t.term.toLowerCase())).slice(0,7).map(t=>t.id)}
function renderHome(){setNav('home');main.innerHTML=`<section class="hero"><span class="badge">START HERE</span><h1>Learn Search &amp; Destroy without being thrown to the wolves.</h1><p>A beginner-first guide to the mode, the objective, common decisions, game terms, and the mistakes most players were expected to learn through random abuse and avoidable deaths.</p></section><div class="path"><button class="path-step" data-go="lesson/mode-basics"><b>1</b><strong>Understand the mode</strong><small>Learn how rounds, sides, the bomb, and win conditions work.</small></button><button class="path-step" data-go="quick"><b>2</b><strong>Get help during a match</strong><small>Choose the situation and see the immediate action first.</small></button><button class="path-step" data-go="fights"><b>3</b><strong>Fix repeated fight problems</strong><small>Use one correction and one small practice mission.</small></button></div><div class="section-label">Fast access</div><div class="button-list two"><button class="bigrow" data-go="quick/dying-early"><strong>I keep dying early</strong><small>Survive the opening without hiding uselessly.</small></button><button class="bigrow" data-go="quick/our-bomb-planted"><strong>We planted the bomb</strong><small>Use positions, sound, and the timer correctly.</small></button><button class="bigrow" data-go="quick/enemy-bomb-planted"><strong>The enemy planted</strong><small>Check time, group, clear, and protect the defuse.</small></button><button class="bigrow" data-go="quick/last-alive"><strong>I am last alive</strong><small>Solve the next problem instead of the whole round.</small></button></div><div class="section-label">Full guide</div><div class="button-list"><button class="bigrow" data-go="learn"><strong>Learn the main ins and outs</strong><small>${LEARN.lessons.length} short lessons from basic rules through post-plant, recovery attempts, and improvement.</small></button><button class="bigrow" data-go="terms"><strong>Game-term dictionary</strong><small>${terms.length} terms explained in ordinary language.</small></button><button class="bigrow" data-go="manual"><strong>Field Manual</strong><small>Thirty problem-based operations for deeper practice.</small></button></div>`;bindGo();window.scrollTo(0,0)}
function renderQuickList(){setNav('quick');main.innerHTML=`<section class="hero"><span class="badge">MID-MATCH HELP</span><h2>What is happening right now?</h2><p>Open the closest situation. The first thing shown is the immediate action, because a countdown is a rude place for an essay.</p></section><div class="button-list">${LEARN.quick.map(q=>`<button class="bigrow" data-go="quick/${q.id}"><strong>${esc(q.title)}</strong><small>${esc(q.short)}</small></button>`).join('')}</div>`;bindGo();window.scrollTo(0,0)}
function renderQuick(id){const q=quickById(id);if(!q)return go('quick');setNav('quick');main.innerHTML=`<button class="ghost" data-go="quick">← All situations</button><section class="hero"><span class="badge">QUICK HELP</span><h1>${esc(q.title)}</h1><p>${esc(q.short)}</p></section><div class="now"><strong>Do this now</strong><span>${esc(q.action)}</span></div><div class="card"><h3>Four steps</h3><div class="steps">${q.steps.map(x=>`<div class="step">${esc(x)}</div>`).join('')}</div></div><div class="card"><h3>Why this works</h3><p>${esc(q.why)}</p></div>${termNote(q.terms)}<div class="quick-actions">${shareButton()}<button class="ghost" data-go="learn">Learn the mode</button></div>`;bindGo();bindShare();window.scrollTo(0,0)}
function renderLearn(){setNav('learn');main.innerHTML=`<section class="hero"><span class="badge">LEARN THE MODE</span><h2>The parts nobody should have to discover through humiliation.</h2><p>Read in order or open the exact subject that keeps costing rounds.</p></section><div class="button-list">${LEARN.lessons.map((l,i)=>`<button class="bigrow" data-go="lesson/${l.id}"><strong>${i+1}. ${esc(l.title)}</strong><small>${esc(l.subtitle)}</small></button>`).join('')}</div><div class="section-label">Individual fights</div><button class="bigrow" data-go="fights"><strong>Winning Fights</strong><small>Ten repeated fight problems with one correction and one practice mission.</small></button><div class="section-label">Deeper practice</div><button class="bigrow" data-go="manual"><strong>Open the 30-operation Field Manual</strong><small>Problem-based lessons for decisions, awareness, bomb play, and improvement.</small></button>`;bindGo();window.scrollTo(0,0)}
function renderLesson(id){const l=lessonById(id);if(!l)return go('learn');setNav('learn');main.innerHTML=`<button class="ghost" data-go="learn">← All lessons</button><section class="hero"><span class="badge">BEGINNER LESSON</span><h1>${esc(l.title)}</h1><p>${esc(l.subtitle)}</p></section><div class="now"><strong>Main idea</strong><span>${esc(l.takeaway)}</span></div>${l.sections.map(s=>`<section class="lesson-section"><h3>${esc(s[0])}</h3><p>${esc(s[1])}</p></section>`).join('')}<div class="card"><h3>Common mistakes</h3><ul class="mistakes">${l.mistakes.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>${termNote(l.terms)}<div class="quick-actions">${shareButton()}<button class="ghost" data-go="quick">Open quick help</button></div>`;bindGo();bindShare();window.scrollTo(0,0)}
function renderFights(){setNav('learn');main.innerHTML=`<button class="ghost" data-go="learn">← Learn</button><section class="hero"><span class="badge">WINNING FIGHTS</span><h2>Which repeated fight problem sounds familiar?</h2><p>The common game term is preserved and explained instead of being used as an entrance exam.</p></section><div class="button-list">${FIGHTS.map(f=>`<button class="bigrow" data-go="fight/${f.id}"><strong>${esc(f.trigger)}</strong><small>Game term: ${esc(f.term)} · ${esc(f.cue)}</small></button>`).join('')}</div>`;bindGo();window.scrollTo(0,0)}
function renderFight(id){const f=fightById(id);if(!f)return go('fights');setNav('learn');main.innerHTML=`<button class="ghost" data-go="fights">← Winning Fights</button><section class="hero"><span class="badge">FIGHT CORRECTION</span><h1>${esc(f.title)}</h1><p>${esc(f.summary)}</p></section><div class="now"><strong>Remember this during the round</strong><span>${esc(f.cue)}</span></div>${termNote([slug(f.term)])}<div class="compare"><div class="bad"><strong>What went wrong</strong>${esc(f.summary)}</div><div class="good"><strong>Better choice</strong>${esc(f.correction)}</div></div><div class="card"><h3>Four-step correction</h3><div class="steps">${f.steps.map(x=>`<div class="step">${esc(x)}</div>`).join('')}</div></div><div class="card accent"><h3>Five-round practice mission</h3><p>${esc(f.mission)}</p></div><div class="quick-actions">${shareButton()}<button class="ghost" data-go="manual">Related Field Manual</button></div>`;bindGo();bindShare();window.scrollTo(0,0)}
function manualRow(o){return `<button class="bigrow" data-go="operation/${o.id}"><strong>${esc(o.title)}</strong><small>Operation ${String(o.id).padStart(2,'0')} · ${esc(o.mission)}</small></button>`}
function renderManual(){setNav('learn');main.innerHTML=`<button class="ghost" data-go="learn">← Learn</button><section class="hero"><span class="badge">FIELD MANUAL</span><h2>Thirty deeper problem-based lessons</h2><p>Use this when the same mistake keeps returning and a quick sentence is no longer enough.</p></section><input class="search" id="manualSearch" placeholder="Search dying early, bomb, timer, sound, cover..."><div class="manual-list" id="manualList">${MANUAL.operations.map(manualRow).join('')}</div>`;bindGo();document.getElementById('manualSearch').oninput=e=>{const q=e.target.value.toLowerCase();document.getElementById('manualList').innerHTML=MANUAL.operations.filter(o=>JSON.stringify(o).toLowerCase().includes(q)).map(manualRow).join('');bindGo()};window.scrollTo(0,0)}
function renderOperation(id){const o=MANUAL.operations.find(x=>x.id===Number(id));if(!o)return go('manual');setNav('learn');const text=[o.title,o.problem,o.truth,o.try,o.mission,o.success].join(' ');main.innerHTML=`<button class="ghost" data-go="manual">← Field Manual</button><section class="hero"><span class="badge">OPERATION ${String(o.id).padStart(2,'0')}</span><h1>${esc(o.title)}</h1></section><div class="now"><strong>One thing to try</strong><span>${esc(o.try)}</span></div><div class="card"><h3>The problem</h3><p>${esc(o.problem)}</p></div><div class="card"><h3>Why it happens</h3><p>${esc(o.truth)}</p></div><div class="card accent"><h3>Practice mission</h3><p>${esc(o.mission)}</p></div><div class="card"><h3>Success looks like</h3><p>${esc(o.success)}</p></div>${termNote(termsInText(text))}<div class="quick-actions">${shareButton()}</div>`;bindGo();bindShare();window.scrollTo(0,0)}
function renderTerms(){setNav('terms');main.innerHTML=`<section class="hero"><span class="badge">GAME-TERM DICTIONARY</span><h2>Learn the language without already needing to know it.</h2><p>These are established in-game and S&amp;D terms. Modern social-media slang is not required equipment.</p></section><input class="search" id="termSearch" placeholder="Search trade, re-peek, plant, rotation..."><div class="term-list" id="termList">${terms.sort((a,b)=>a.term.localeCompare(b.term)).map(termRow).join('')}</div>`;bindGo();document.getElementById('termSearch').oninput=e=>{const q=e.target.value.toLowerCase();document.getElementById('termList').innerHTML=terms.filter(t=>(t.term+' '+t.definition).toLowerCase().includes(q)).map(termRow).join('');bindGo()};window.scrollTo(0,0)}
function termRow(t){return `<button class="term-row" data-go="term/${encodeURIComponent(t.id)}"><strong>${esc(t.term)}</strong><small>${esc(t.definition)}</small></button>`}
function renderTerm(id){const t=termById(id);if(!t)return go('terms');setNav('terms');main.innerHTML=`<button class="ghost" data-go="terms">← Dictionary</button><section class="hero"><span class="badge">GAME TERM</span><h1>${esc(t.term)}</h1><p>${esc(t.definition)}</p></section><div class="card accent"><h3>Why the dictionary exists</h3><p>The guide keeps real game terminology so players can understand teammates, videos, and competitive discussion. Every term should be learnable without already belonging to the club.</p></div><div class="quick-actions">${shareButton()}</div>`;bindGo();bindShare();window.scrollTo(0,0)}
function renderNotes(){setNav('notes');const saved=localStorage.getItem('snd-beginner-notes')||'';main.innerHTML=`<section class="hero"><span class="badge">FIELD NOTES</span><h2>Turn one mistake into one replacement action.</h2><p>Notes are stored only on this device.</p></section><textarea class="notearea" id="notes" placeholder="Example:\nI died crossing while sprinting. Next match I will stop at cover and pre-aim before crossing.\n\nNew term: trade = staying close enough to respond after a teammate is eliminated."></textarea><div class="quick-actions"><button class="primary" id="saveNotes">Save notes</button><button class="ghost" id="clearNotes">Clear</button></div><div class="card"><h3>Four useful review questions</h3><div class="steps"><div class="step">What did I know before moving?</div><div class="step">What directions could see me?</div><div class="step">What did the bomb and timer require?</div><div class="step">What one action will I change next round?</div></div></div>`;document.getElementById('notes').value=saved;document.getElementById('saveNotes').onclick=()=>{localStorage.setItem('snd-beginner-notes',document.getElementById('notes').value);toast('Field notes saved')};document.getElementById('clearNotes').onclick=()=>{document.getElementById('notes').value='';localStorage.removeItem('snd-beginner-notes');toast('Notes cleared')};window.scrollTo(0,0)}
function renderAbout(){setNav('');main.innerHTML=`<button class="ghost" data-go="home">← Start</button><section class="hero"><span class="badge">VERSION 3.2</span><h1>A beginner-first Search &amp; Destroy companion</h1><p>Created by Michael Barnes to help players learn the mode without depending on trial, error, and abuse from strangers.</p></section><div class="card"><h3>What it covers</h3><p>Mode rules, attacking, defending, the bomb, timer decisions, information, sound, teammate support, post-plant play, recovery attempts, last-player situations, gunfight corrections, game terminology, and deliberate practice.</p></div><div class="card"><h3>Language rule</h3><p>Use ordinary language first. Keep established game terminology, define it in the dictionary, and point readers toward that definition when the term appears.</p></div><div class="card"><h3>Source approach</h3><p>The beginner structure uses official Call of Duty Search &amp; Destroy fundamentals and current CODM competitive settings where they apply. Playlist details can vary, so the guide avoids pretending that another title’s exact plant or defuse timing automatically applies to CODM.</p><p><a href="https://www.callofduty.com/guides/blackops6/modes/call-of-duty-guides-black-ops-6-multiplayer-mode-guide-search-and-destroy" target="_blank" rel="noopener">Official Search &amp; Destroy guide</a></p><p><a href="https://www.callofduty.com/mobile/esports/esports-settings" target="_blank" rel="noopener">Official CODM esports settings</a></p></div><div class="card"><h3>Build</h3><p>Version 3.2.0 · MB-SNDC-2026-0723-032</p><p>Copyright © 2026 Michael Barnes. All Rights Reserved.</p></div>`;bindGo();window.scrollTo(0,0)}
function bindGo(){document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go))}
function render(){const r=route(),[root,id]=r.split('/');if(root==='home')renderHome();else if(root==='quick'&&!id)renderQuickList();else if(root==='quick')renderQuick(id);else if(root==='learn')renderLearn();else if(root==='lesson')renderLesson(id);else if(root==='fights')renderFights();else if(root==='fight')renderFight(id);else if(root==='manual')renderManual();else if(root==='operation')renderOperation(id);else if(root==='terms')renderTerms();else if(root==='term')renderTerm(id);else if(root==='notes')renderNotes();else if(root==='about')renderAbout();else go('home')}
document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>go(b.dataset.root));document.getElementById('aboutBtn').onclick=()=>go('about');window.addEventListener('hashchange',render);
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;const b=document.getElementById('installBtn');b.hidden=false;b.onclick=async()=>{await deferredInstall.prompt();deferredInstall=null;b.hidden=true}});
if('serviceWorker'in navigator){window.addEventListener('load',async()=>{const reg=await navigator.serviceWorker.register('./sw.js');const updateBtn=document.getElementById('updateBtn');const offer=w=>{waitingWorker=w;updateBtn.hidden=false;updateBtn.onclick=()=>waitingWorker.postMessage({type:'SKIP_WAITING'})};if(reg.waiting)offer(reg.waiting);reg.addEventListener('updatefound',()=>{const w=reg.installing;w.addEventListener('statechange',()=>{if(w.state==='installed'&&navigator.serviceWorker.controller)offer(w)})});navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload())})}
if(!location.hash)location.hash='#/home';else render();
</script>
</body>
</html>
