<html lang="en">
<head>
<meta charset="utf-8">

<title>Search & Destroy Companion — Operator Atlas</title>
<style>
:root{
 --bg:#07100c;--panel:#101a14;--panel2:#17231b;--line:#2b3c31;--text:#f4f7f5;
 --muted:#a9b8ae;--green:#6dff8c;--green2:#b7ffc5;--yellow:#ffd166;--red:#ff6670;
 --blue:#66b7ff;--purple:#c982ff;--orange:#ff9f43;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:radial-gradient(circle at top,#112019 0,#07100c 46%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.45}
button,input,textarea{font:inherit}button{cursor:pointer}
.shell{max-width:940px;margin:auto;min-height:100vh;padding-bottom:88px}
header{position:sticky;top:0;z-index:40;background:rgba(7,16,12,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 14px 10px}
.brand{display:flex;align-items:center;justify-content:space-between;gap:12px}.brand strong{font-size:17px}.brand small{display:block;color:var(--muted);font-size:11px}
.iconbtn,.ghost,.primary,.chip,.modebtn{border:1px solid var(--line);color:var(--text);background:var(--panel);border-radius:12px;padding:10px 12px}
.primary{background:var(--green);color:#07100c;border-color:var(--green);font-weight:850}.ghost.active,.chip.active,.modebtn.active{border-color:var(--green);color:var(--green)}
main{padding:16px}.hero{padding:8px 0 16px}.hero h1,.hero h2{margin:5px 0 8px;line-height:1.06}.hero h1{font-size:34px}.hero h2{font-size:28px}.hero p{margin:0;color:var(--muted)}
.badge{display:inline-flex;border:1px solid #3d6348;background:#183020;color:var(--green2);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850;letter-spacing:.06em}.badge.bonus{border-color:#715d28;background:#302813;color:#ffe092}
.scope-note{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:12px;color:var(--muted);font-size:13px;margin:0 0 16px}.scope-note strong{color:var(--text)}
.picker-tools{display:grid;grid-template-columns:1fr auto;gap:8px;margin:0 0 12px}.search,.notearea{width:100%;border:1px solid var(--line);background:#08110d;color:var(--text);border-radius:12px;padding:12px}.notearea{min-height:95px}
.section-label{margin:22px 0 9px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.11em;font-weight:850}
.map-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.map-card{position:relative;border:1px solid var(--line);background:var(--panel);border-radius:18px;overflow:hidden;color:var(--text);text-align:left;padding:0;min-height:270px}.map-card img{width:100%;height:205px;object-fit:contain;background:#050907;display:block;filter:saturate(.96) contrast(1.06)}.map-card::after{content:"";position:absolute;left:0;right:0;top:145px;height:62px;background:linear-gradient(transparent,rgba(7,16,12,.96))}.map-card-body{position:relative;z-index:2;padding:13px}.map-card h3{margin:5px 0 3px;font-size:20px}.map-card p{margin:0;color:var(--muted);font-size:12px}.map-card .open-cue{display:block;color:var(--green);font-size:12px;margin-top:8px;font-weight:800}
.map-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}.map-head h1{margin:5px 0 4px;font-size:31px}.map-head p{margin:0;color:var(--muted);font-size:13px}.map-actions{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.mode-row,.layer-row{display:flex;gap:7px;overflow:auto;padding:4px 0 10px;scrollbar-width:none}.mode-row::-webkit-scrollbar,.layer-row::-webkit-scrollbar{display:none}.modebtn,.chip{white-space:nowrap;padding:9px 11px;font-size:13px}
.map-stage{position:relative;border:1px solid var(--line);border-radius:18px;background:#050907;overflow:hidden}.map-stage.expanded{position:fixed;z-index:100;inset:0;border-radius:0;background:#020403;padding-top:env(safe-area-inset-top);overflow:auto}.map-viewport{overflow:auto;background:#050907;touch-action:pan-x pan-y pinch-zoom}.map-stage.expanded .map-viewport{height:calc(100vh - 62px - env(safe-area-inset-top))}.map-stage-inner{position:relative;background:#050907;transform-origin:top left;min-width:100%}.map-stage-inner img{display:block;width:100%;height:100%;object-fit:contain;background:#050907}.overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.map-point{position:absolute;transform:translate(-50%,-50%);z-index:8;border:1px solid rgba(255,255,255,.75);background:rgba(8,18,13,.9);color:#fff;border-radius:999px;padding:5px 7px;font-size:11px;font-weight:850;box-shadow:0 2px 8px rgba(0,0,0,.6);max-width:104px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.map-point.side-A{border-color:var(--red)}.map-point.side-B{border-color:var(--yellow)}.map-point.side-MID{border-color:var(--purple)}.map-point.selected{outline:3px solid var(--green);z-index:11}.map-point.hidden,.site-marker.hidden,.spawn-marker.hidden{display:none}
.site-marker,.spawn-marker{position:absolute;transform:translate(-50%,-50%);z-index:7;display:flex;align-items:center;justify-content:center;font-weight:900}.site-marker{width:42px;height:42px;border-radius:50%;background:#d6232e;border:3px solid #fff;color:#fff;font-size:20px;box-shadow:0 0 0 5px rgba(214,35,46,.25)}.spawn-marker{font-size:11px;color:#07100c;background:var(--green);padding:5px 8px;border-radius:999px;border:2px solid white}
.map-tools{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px;background:rgba(5,9,7,.95);border-top:1px solid var(--line)}.map-tool-buttons{display:flex;gap:6px;align-items:center}.map-tools small{color:var(--muted)}.zoom-value{color:var(--muted);font-size:12px;min-width:38px;text-align:center}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:8px 2px 0;font-size:11px;color:var(--muted)}.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}
.card{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:15px;margin:12px 0}.card h3{margin:0 0 8px;color:var(--green);font-size:18px}.card p{margin:0 0 8px}.card p:last-child{margin-bottom:0}.leader-card{border-color:#486b51;background:linear-gradient(135deg,#14231a,#0f1913)}.leader-call{font-size:20px;font-weight:850;line-height:1.25;margin:5px 0 12px}.roles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.role{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:10px}.role strong{display:block;color:var(--green2);font-size:12px}.role span{font-size:14px}.detail-card{border-left:4px solid var(--yellow)}.detail-card .kind{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}.quick-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.callout-strip{display:flex;gap:7px;overflow:auto;padding:3px 0 4px;scrollbar-width:none}.callout-strip::-webkit-scrollbar{display:none}.callout-shortcut{white-space:nowrap;border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:999px;padding:7px 10px;font-size:12px}.callout-shortcut.active{border-color:var(--green);color:var(--green)}
.manual-list{display:flex;flex-direction:column;gap:8px}.row{width:100%;text-align:left;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:13px;padding:13px}.row strong{display:block}.row small{color:var(--muted)}
.bottom{position:fixed;left:0;right:0;bottom:0;z-index:50;border-top:1px solid var(--line);background:rgba(7,16,12,.97);padding:7px 8px calc(7px + env(safe-area-inset-bottom))}.bottom-inner{max-width:940px;margin:auto;display:grid;grid-template-columns:repeat(5,1fr)}.nav{border:0;background:transparent;color:var(--muted);padding:6px 3px;font-size:10px}.nav b{display:block;font-size:19px;line-height:1.1}.nav.active{color:var(--green)}.about{color:var(--muted);font-size:13px}.toast{position:fixed;z-index:200;left:50%;bottom:92px;transform:translateX(-50%);background:#1d2b22;color:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 13px;display:none}
@media(max-width:620px){.map-grid{grid-template-columns:1fr}.map-card{min-height:245px}.map-card img{height:185px}.roles{grid-template-columns:1fr 1fr}.hero h1{font-size:29px}.map-point{font-size:10px;padding:4px 6px;max-width:80px}.picker-tools{grid-template-columns:1fr}.map-head{flex-direction:column}.map-actions{justify-content:flex-start}}
@media(max-width:390px){.roles{grid-template-columns:1fr}.map-point{max-width:68px}.leader-call{font-size:18px}}
</style>
</head>
<body>
<div class="shell">
<header><div class="brand"><div><strong>Search & Destroy Companion</strong><small>Operator Atlas · Visual squad command</small></div><button class="iconbtn" id="installBtn" hidden>Install</button></div></header>
<main id="main"></main>
</div>
<nav class="bottom"><div class="bottom-inner">
<button class="nav active" data-nav="maps"><b>⌖</b>Maps</button>
<button class="nav" data-nav="brief"><b>◎</b>Brief</button>
<button class="nav" data-nav="manual"><b>☰</b>Manual</button>
<button class="nav" data-nav="notes"><b>✎</b>Notes</button>
<button class="nav" data-nav="about"><b>ⓘ</b>About</button>
</div></nav>
<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script src="atlas_data.js"></script>
<script>
const MAPS=window.ATLAS_MAPS, MANUAL=window.APP_DATA;
const main=document.getElementById('main');
let currentMap=localStorage.getItem('snd-last-map')||'tunisia';
let currentMode=localStorage.getItem('snd-last-mode')||'overview';
const VALID_MODES=['overview','attackA','attackB','defense','retake','sightlines'];
if(!MAPS[currentMap]) currentMap='tunisia';
if(!VALID_MODES.includes(currentMode)) currentMode='overview';
let selectedPoint=null,expanded=false,zoomLevel=1,deferredInstall=null;
const layerState={labels:true,sites:true,spawns:true,routes:true,sightlines:true};
const notes=JSON.parse(localStorage.getItem('snd-atlas-notes')||'{}');

function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setNav(name){document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.nav===name))}
function toast(s){const t=document.getElementById('toast');t.textContent=s;t.style.display='block';setTimeout(()=>t.style.display='none',1500)}
function imgTag(m,cls=''){return `<img class="${cls}" src="${esc(m.image.local)}" alt="${esc(m.name)} visual tactical map">`}
function navTo(view){if(view==='maps')showMapPicker();if(view==='brief')showMap(currentMap,currentMode);if(view==='manual')showManual();if(view==='notes')showNotes();if(view==='about')showAbout()}
document.querySelectorAll('.nav').forEach(b=>b.addEventListener('click',()=>navTo(b.dataset.nav)));

function mapCard(m){return `<button class="map-card" data-map="${m.id}" data-search="${esc((m.name+' '+m.description+' '+m.status).toLowerCase())}">${imgTag(m)}<div class="map-card-body"><span class="badge ${m.id==='raid'?'bonus':''}">${esc(m.status)}</span><h3>${esc(m.name)}</h3><p>${esc(m.description)}</p><span class="open-cue">Open tactical board →</span></div></button>`}
function bindPickerCards(){document.querySelectorAll('[data-map]').forEach(b=>b.onclick=()=>showMap(b.dataset.map,'overview'))}
function showMapPicker(){
 setNav('maps');
 const comp=Object.values(MAPS).filter(m=>m.status.includes('OFFICIAL'));
 const bonus=Object.values(MAPS).filter(m=>!m.status.includes('OFFICIAL'));
 main.innerHTML=`<section class="hero"><span class="badge">OPERATOR ATLAS 2.0</span><h1>Which map got voted?</h1><p>Open the map before Round 1, choose your side, and give every operator one job.</p></section>
 <div class="scope-note"><strong>Verified scope:</strong> Tunisia, Firing Range, Coastal, Slums, and Meltdown are the official 2026 competitive Search &amp; Destroy pool. Activision's public Season 6 announcement does not list Ranked maps by mode, so Raid is included as the requested Ranked reference rather than mislabeled as an official rotation map.</div>
 <div class="picker-tools"><input class="search" id="mapSearch" placeholder="Find Tunisia, Coastal, Raid..."><button class="primary" id="openLast">Open last map</button></div>
 <div class="section-label">Official 2026 competitive S&amp;D</div><div class="map-grid" id="compGrid">${comp.map(mapCard).join('')}</div>
 <div class="section-label">Requested Ranked reference</div><div class="map-grid" id="bonusGrid">${bonus.map(mapCard).join('')}</div>`;
 bindPickerCards();
 document.getElementById('openLast').onclick=()=>showMap(currentMap,currentMode);
 document.getElementById('mapSearch').oninput=e=>{const q=e.target.value.toLowerCase().trim();document.querySelectorAll('.map-card').forEach(c=>c.hidden=q&&!c.dataset.search.includes(q))};
 window.scrollTo(0,0);
}
function modePlan(m,mode){return m.plans[mode]||m.plans.overview}
function relevantCallouts(m,mode){if(mode==='attackA')return m.callouts.filter(c=>c.side==='A'||c.side==='MID');if(mode==='attackB')return m.callouts.filter(c=>c.side==='B'||c.side==='MID');if(mode==='defense'||mode==='retake'||mode==='sightlines')return m.callouts;return m.callouts}
function modeRoutes(m,mode){if(mode==='retake')return m.retake||[];return m.routes[mode]||[]}
function renderSvg(m,mode){
 const routes=modeRoutes(m,mode);const showRoutes=layerState.routes&&(mode==='attackA'||mode==='attackB'||mode==='defense'||mode==='retake');const showSight=layerState.sightlines&&(mode==='overview'||mode==='sightlines'||mode==='defense');
 const routeSvg=showRoutes?routes.map(r=>`<polyline points="${r.points.map(p=>p.join(',')).join(' ')}" fill="none" stroke="#6dff8c" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"><title>${esc(r.label)}</title></polyline>`).join(''):'';
 const sightSvg=showSight?m.sightlines.map(s=>`<line x1="${s.a[0]}" y1="${s.a[1]}" x2="${s.b[0]}" y2="${s.b[1]}" stroke="#66b7ff" stroke-width="1.3" stroke-dasharray="3 2"><title>${esc(s.label)}</title></line>`).join(''):'';
 return `<svg class="overlay" viewBox="0 0 100 100" preserveAspectRatio="none"><defs><marker id="arrow" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 z" fill="#6dff8c"/></marker></defs>${routeSvg}${sightSvg}</svg>`;
}
function renderMarkers(m,mode){
 const calls=relevantCallouts(m,mode);
 const points=calls.map(c=>`<button class="map-point side-${c.side} ${layerState.labels?'':'hidden'} ${selectedPoint===c.name?'selected':''}" data-point="${esc(c.name)}" style="left:${c.x}%;top:${c.y}%">${esc(c.name)}</button>`).join('');
 const sites=Object.entries(m.sites).map(([k,p])=>`<button class="site-marker ${layerState.sites?'':'hidden'}" data-site="${k}" style="left:${p[0]}%;top:${p[1]}%">${k}</button>`).join('');
 const spawns=Object.entries(m.spawns).map(([k,p])=>`<span class="spawn-marker ${layerState.spawns?'':'hidden'}" style="left:${p[0]}%;top:${p[1]}%">${k.toUpperCase()}</span>`).join('');
 return points+sites+spawns;
}
function showMap(id=currentMap,mode=currentMode){
 currentMap=id;currentMode=mode;selectedPoint=null;localStorage.setItem('snd-last-map',id);localStorage.setItem('snd-last-mode',mode);setNav('brief');
 const m=MAPS[id],plan=modePlan(m,mode);const modes=[['overview','Overview'],['attackA','Attack A'],['attackB','Attack B'],['defense','Defense'],['retake','Retake'],['sightlines','Sightlines']];
 const calls=relevantCallouts(m,mode);
 main.innerHTML=`<button class="ghost" id="backMaps">← Choose map</button>
 <section class="map-head"><div><span class="badge ${m.id==='raid'?'bonus':''}">${esc(m.status)}</span><h1>${esc(m.name)}</h1><p>${esc(m.description)}</p></div><div class="map-actions"><button class="ghost" id="previousMap">← Prev</button><button class="ghost" id="nextMap">Next →</button></div></section>
 <div class="mode-row">${modes.map(([id2,l])=>`<button class="modebtn ${mode===id2?'active':''}" data-mode="${id2}">${l}</button>`).join('')}</div>
 <div class="layer-row"><button class="chip ${layerState.labels?'active':''}" data-layer="labels">Callouts</button><button class="chip ${layerState.sites?'active':''}" data-layer="sites">Bomb sites</button><button class="chip ${layerState.spawns?'active':''}" data-layer="spawns">Spawns</button><button class="chip ${layerState.routes?'active':''}" data-layer="routes">Routes</button><button class="chip ${layerState.sightlines?'active':''}" data-layer="sightlines">Sightlines</button></div>
 <div class="callout-strip">${calls.map(c=>`<button class="callout-shortcut" data-shortcut="${esc(c.name)}">${esc(c.name)}</button>`).join('')}</div>
 <div class="map-stage ${expanded?'expanded':''}" id="mapStage"><div class="map-viewport" id="mapViewport"><div class="map-stage-inner" id="mapInner" style="aspect-ratio:${m.image.aspect};width:${zoomLevel*100}%">${imgTag(m,'map-image')}${renderSvg(m,mode)}${renderMarkers(m,mode)}</div></div>
 <div class="map-tools"><small>Tap a callout for live position intel.</small><div class="map-tool-buttons"><button class="ghost" id="zoomOut">−</button><span class="zoom-value">${Math.round(zoomLevel*100)}%</span><button class="ghost" id="zoomIn">+</button><button class="ghost" id="resetZoom">Reset</button><button class="ghost" id="expandMap">${expanded?'Close':'Expand'}</button></div></div></div>
 <div class="legend"><span><i style="background:var(--red)"></i>A-side</span><span><i style="background:var(--yellow)"></i>B-side</span><span><i style="background:var(--purple)"></i>Mid</span><span><i style="background:var(--green)"></i>Squad route</span><span><i style="background:var(--blue)"></i>Sightline</span></div>
 <div class="card detail-card" id="pointDetail"><div class="kind">Live position intel</div><h3>Tap a callout</h3><p>The visual stays on screen while the selected position shows what it watches and the cleanest way to clear it.</p></div>
 <div class="card leader-card"><span class="badge">${esc(plan.title)}</span><div class="leader-call">${esc(plan.call)}</div><div class="roles">${plan.roles.map(r=>`<div class="role"><strong>${esc(r[0])}</strong><span>${esc(r[1])}</span></div>`).join('')}</div><div class="quick-buttons"><button class="primary" id="copyCall">Copy leader call</button><button class="ghost" id="saveBrief">Save brief</button></div></div>
 <div class="card"><h3>Squad note</h3><textarea class="notearea" id="mapNote" placeholder="Team alias, route timing, enemy habit, or correction">${esc(notes[id]||'')}</textarea><div class="quick-buttons"><button class="primary" id="saveNote">Save note</button></div></div>`;
 bindMapEvents(m,mode,plan);window.scrollTo(0,0);
}
function adjacentMap(id,offset){const ids=Object.keys(MAPS),i=ids.indexOf(id);return ids[(i+offset+ids.length)%ids.length]}
function updateZoom(m,mode,delta=null){if(delta===0)zoomLevel=1;else zoomLevel=Math.max(1,Math.min(2.5,Math.round((zoomLevel+delta)*10)/10));showMap(m.id,mode)}
function bindMapEvents(m,mode,plan){
 document.getElementById('backMaps').onclick=showMapPicker;document.getElementById('previousMap').onclick=()=>showMap(adjacentMap(m.id,-1),'overview');document.getElementById('nextMap').onclick=()=>showMap(adjacentMap(m.id,1),'overview');
 document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{zoomLevel=1;showMap(m.id,b.dataset.mode)});document.querySelectorAll('[data-layer]').forEach(b=>b.onclick=()=>{layerState[b.dataset.layer]=!layerState[b.dataset.layer];showMap(m.id,mode)});
 document.querySelectorAll('[data-point]').forEach(b=>b.onclick=()=>showPoint(m,b.dataset.point));document.querySelectorAll('[data-shortcut]').forEach(b=>b.onclick=()=>showPoint(m,b.dataset.shortcut));document.querySelectorAll('[data-site]').forEach(b=>b.onclick=()=>showSite(m,b.dataset.site));
 document.getElementById('zoomOut').onclick=()=>updateZoom(m,mode,-.25);document.getElementById('zoomIn').onclick=()=>updateZoom(m,mode,.25);document.getElementById('resetZoom').onclick=()=>updateZoom(m,mode,0);document.getElementById('expandMap').onclick=()=>{expanded=!expanded;showMap(m.id,mode)};
 document.getElementById('copyCall').onclick=async()=>{try{await navigator.clipboard.writeText(plan.call);toast('Leader call copied')}catch(e){toast('Copy blocked by browser')}};document.getElementById('saveBrief').onclick=()=>{localStorage.setItem('snd-saved-brief',JSON.stringify({map:m.id,mode,time:Date.now()}));toast('Brief saved')};document.getElementById('saveNote').onclick=()=>{notes[m.id]=document.getElementById('mapNote').value;localStorage.setItem('snd-atlas-notes',JSON.stringify(notes));toast('Map note saved')};
}
function showPoint(m,name){selectedPoint=name;document.querySelectorAll('.map-point').forEach(b=>b.classList.toggle('selected',b.dataset.point===name));document.querySelectorAll('.callout-shortcut').forEach(b=>b.classList.toggle('active',b.dataset.shortcut===name));const c=m.callouts.find(x=>x.name===name);if(!c)return;document.getElementById('pointDetail').innerHTML=`<div class="kind">${esc(c.side)} side · ${esc(c.kind)}</div><h3>${esc(c.name)}</h3><p><strong>What it is:</strong> ${esc(c.summary)}</p><p><strong>Watches:</strong> ${esc(c.watch)}</p><p><strong>Clear it:</strong> ${esc(c.counter)}</p>`}
function showSite(m,s){document.getElementById('pointDetail').innerHTML=`<div class="kind">Bomb site</div><h3>${s} Site</h3><p>Open the ${s} attack, Defense, or Retake tab to display the matching routes and squad assignments.</p>`}
function manualRow(op){return `<button class="row" data-op="${op.id}"><strong>${esc(op.title)}</strong><small>Operation ${String(op.id).padStart(2,'0')} · ${esc(op.mission)}</small></button>`}
function bindManualRows(){document.querySelectorAll('[data-op]').forEach(b=>b.onclick=()=>showOperation(Number(b.dataset.op)))}
function showManual(){setNav('manual');main.innerHTML=`<section class="hero"><span class="badge">FIELD MANUAL</span><h2>Fix the problem between rounds</h2><p>The visual atlas handles geography. The operations handle decisions, habits, gunfights, bomb play, and improvement.</p></section><input class="search" id="manualSearch" placeholder="Search dying first, re-peeking, post-plant..."><div class="manual-list" id="manualList">${MANUAL.operations.map(manualRow).join('')}</div>`;bindManualRows();document.getElementById('manualSearch').oninput=e=>{const q=e.target.value.toLowerCase();document.getElementById('manualList').innerHTML=MANUAL.operations.filter(o=>JSON.stringify(o).toLowerCase().includes(q)).map(manualRow).join('');bindManualRows()};window.scrollTo(0,0)}
function showOperation(id){const o=MANUAL.operations.find(x=>x.id===id);setNav('manual');const box=(h,v)=>`<div class="card"><h3>${esc(h)}</h3><p>${esc(v)}</p></div>`;main.innerHTML=`<button class="ghost" id="backManual">← Field manual</button><section class="hero"><span class="badge">OPERATION ${String(o.id).padStart(2,'0')}</span><h2>${esc(o.title)}</h2></section>${box('The problem',o.problem)}${box('The truth',o.truth)}${box('One thing to try',o.try)}${box('Mission',o.mission)}${box('Success looks like',o.success)}`;document.getElementById('backManual').onclick=showManual;window.scrollTo(0,0)}
function showNotes(){setNav('notes');const entries=Object.entries(notes).filter(([,n])=>n.trim());main.innerHTML=`<section class="hero"><span class="badge">SQUAD NOTES</span><h2>Your map-specific calls</h2><p>Stored on this device.</p></section>${entries.length?entries.map(([id,n])=>`<div class="card"><h3>${esc(MAPS[id]?.name||id)}</h3><p>${esc(n)}</p><div class="quick-buttons"><button class="ghost" data-open-note="${id}">Open map</button><button class="ghost" data-delete-note="${id}">Delete</button></div></div>`).join(''):'<div class="card about">No map notes saved yet.</div>'}`;document.querySelectorAll('[data-open-note]').forEach(b=>b.onclick=()=>showMap(b.dataset.openNote,'overview'));document.querySelectorAll('[data-delete-note]').forEach(b=>b.onclick=()=>{delete notes[b.dataset.deleteNote];localStorage.setItem('snd-atlas-notes',JSON.stringify(notes));showNotes()})}
function showAbout(){setNav('about');main.innerHTML=`<section class="hero"><span class="badge">OPERATOR ATLAS 2.0</span><h2>Visual squad command for Search &amp; Destroy</h2></section><div class="card about"><p><strong>Created by Michael Barnes.</strong></p><p>Copyright © 2026 Michael Barnes. All Rights Reserved.</p><p>Unofficial fan-made tactical reference. Not affiliated with or endorsed by Activision.</p></div><div class="card"><h3>Verified map scope</h3><p>Tunisia, Firing Range, Coastal, Slums, and Meltdown are the official 2026 competitive Search &amp; Destroy pool. Raid is included as a requested Ranked reference. The app does not claim a complete official Ranked-by-mode list because Activision has not published one in the current public Season 6 material.</p></div><div class="card"><h3>Visual approach</h3><p>Every map uses a locally packaged tactical visual so the atlas works offline. Callouts, sites, spawns, routes, sightlines, leader calls, and operator assignments are separate interactive layers.</p></div><div class="card"><h3>Build</h3><p>Version 2.0.0 · MB-SNDC-2026-0721-020</p></div>`}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;const b=document.getElementById('installBtn');b.hidden=false;b.onclick=async()=>{await deferredInstall.prompt();deferredInstall=null;b.hidden=true}});
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
showMapPicker();
</script>
</body>
</html>
