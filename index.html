<style>

.iconbtn,.ghost,.primary,.chip,.modebtn{border:1px solid var(--line);color:var(--text);background:var(--panel);border-radius:12px;padding:10px 12px}.primary{background:var(--green);color:#07100c;border-color:var(--green);font-weight:850}.ghost.active,.chip.active,.modebtn.active{border-color:var(--green);color:var(--green)}
main{padding:16px}.hero{padding:8px 0 16px}.hero h1,.hero h2{margin:5px 0 8px;line-height:1.06}.hero h1{font-size:34px}.hero h2{font-size:28px}.hero p{margin:0;color:var(--muted)}
.badge{display:inline-flex;border:1px solid #3d6348;background:#183020;color:var(--green2);border-radius:999px;padding:4px 8px;font-size:11px;font-weight:850;letter-spacing:.06em}.badge.warn{border-color:#715d28;background:#302813;color:#ffe092}
.section-label{margin:22px 0 9px;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.11em;font-weight:850}
.card{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:15px;margin:12px 0}.card h3{margin:0 0 8px;color:var(--green);font-size:18px}.card p{margin:0 0 8px}.card p:last-child{margin-bottom:0}.card.accent{border-color:#486b51;background:linear-gradient(135deg,#14231a,#0f1913)}
.scenario-grid,.plan-grid,.fight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}.scenario-card,.plan-card,.fight-card{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:17px;padding:14px;text-align:left;min-height:145px;display:flex;flex-direction:column;justify-content:space-between}.scenario-card:hover,.scenario-card:focus,.plan-card:hover,.plan-card:focus,.fight-card:hover,.fight-card:focus{border-color:var(--green)}
.scenario-icon,.plan-icon{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:13px;background:#183020;border:1px solid #3d6348;color:var(--green);font-size:23px;font-weight:900}.scenario-card strong,.plan-card strong,.fight-card strong{display:block;font-size:18px;line-height:1.13;margin:9px 0 5px}.scenario-card small,.plan-card small,.fight-card small{color:var(--muted);font-size:12px}.open-cue{color:var(--green);font-size:12px;font-weight:850;margin-top:10px}
.emergency{border:1px solid #705b2a;background:linear-gradient(140deg,#2b2515,#17180f);border-radius:18px;padding:15px;margin-bottom:14px}.emergency strong{color:#ffe49a}.nonneg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.nonneg>div{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:12px;text-align:center}.nonneg b{display:block;color:var(--green);font-size:20px}.nonneg span{font-size:12px;color:var(--muted)}
.detail-hero{border:1px solid var(--line);background:linear-gradient(140deg,#13251a,#0b140f);border-radius:18px;padding:16px;margin:12px 0}.detail-hero h1{font-size:31px;margin:6px 0 7px;line-height:1.05}.detail-hero p{margin:0;color:var(--muted)}
.leader-call{border:1px solid #5d7133;background:#252d17;color:#efffc8;border-radius:16px;padding:15px;margin:12px 0}.leader-call strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:#dfff98}.leader-call span{display:block;font-size:21px;font-weight:850;line-height:1.25;margin-top:5px}
.rule-card{border-left:5px solid var(--green)}.steps{counter-reset:step;display:flex;flex-direction:column;gap:8px}.step{counter-increment:step;display:grid;grid-template-columns:36px 1fr;gap:10px;align-items:center;border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:10px}.step:before{content:counter(step);display:flex;align-items:center;justify-content:center;width:31px;height:31px;border-radius:50%;background:var(--green);color:#07100c;font-weight:900}
.replace-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.replace{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:11px}.replace .bad{color:#ff9da4;font-size:12px}.replace .good{color:var(--green2);font-weight:750;margin-top:6px}
.visual{border:1px solid var(--line);background:#050907;border-radius:18px;padding:8px;margin:12px 0;overflow:hidden}.visual svg{width:100%;height:auto;display:block}.v-label{fill:#f4f7f5;font:700 16px system-ui}.v-small{fill:#a9b8ae;font:600 12px system-ui}.v-good{stroke:#6dff8c;fill:none;stroke-width:7;stroke-linecap:round}.v-bad{stroke:#ff6670;fill:none;stroke-width:7;stroke-linecap:round;stroke-dasharray:10 8}.v-player{fill:#17231b;stroke:#f4f7f5;stroke-width:3}.v-team{fill:#183020;stroke:#6dff8c;stroke-width:3}.v-enemy{fill:#32191c;stroke:#ff6670;stroke-width:3}.v-objective{fill:#302813;stroke:#ffd166;stroke-width:3}
.plan-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.plan-head h1{margin:5px 0}.goal{color:var(--muted)}.roles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.role{border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:10px}.role strong{display:block;color:var(--green2);font-size:12px}.role span{font-size:14px}.rule-pills{display:flex;gap:7px;flex-wrap:wrap}.rule-pill{border:1px solid #486b51;background:#14231a;color:var(--green2);border-radius:999px;padding:7px 10px;font-size:12px}
.calls-list{display:flex;flex-direction:column;gap:10px}.call-card{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:14px}.call-card h3{margin:0}.formula{color:var(--green);font-size:12px;font-weight:900;letter-spacing:.07em;margin:5px 0 10px}.badgood{display:grid;grid-template-columns:1fr 1fr;gap:8px}.badgood>div{border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--panel2)}.badgood strong{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em}.badgood .bad strong{color:#ff9da4}.badgood .good strong{color:var(--green2)}
.manual-list{display:flex;flex-direction:column;gap:8px}.row{width:100%;text-align:left;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:13px;padding:13px}.row strong{display:block}.row small{color:var(--muted)}.search,.notearea{width:100%;border:1px solid var(--line);background:#08110d;color:var(--text);border-radius:12px;padding:12px}.notearea{min-height:150px}
.fight-card{min-height:138px}.fight-tag{color:var(--green);font-size:11px;font-weight:900;letter-spacing:.08em}.fight-hero{border:1px solid var(--line);background:linear-gradient(140deg,#13251a,#0b140f);border-radius:18px;padding:16px;margin-bottom:12px}.fight-hero h1{font-size:31px;margin:5px 0 7px;line-height:1.05}.fight-hero p{margin:0;color:var(--muted)}.fight-diagram{border:1px solid var(--line);background:#050907;border-radius:18px;padding:8px;margin:12px 0;overflow:hidden}.fight-diagram svg{display:block;width:100%;height:auto}.fight-legend{display:grid;grid-template-columns:1fr 1fr;gap:8px}.fight-legend>div{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:10px}.fight-legend strong{display:block;font-size:12px;color:var(--green2);text-transform:uppercase}.fight-legend span{font-size:13px;color:var(--muted)}.fight-steps{counter-reset:fstep;display:flex;flex-direction:column;gap:8px}.fight-step{counter-increment:fstep;display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;border:1px solid var(--line);background:var(--panel2);border-radius:12px;padding:10px}.fight-step:before{content:counter(fstep);display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--green);color:#07100c;font-weight:900}.cue-card{border:1px solid #5e7131;background:#252d17;color:#efffc8;border-radius:15px;padding:14px;margin:12px 0}.cue-card strong{display:block;color:#dfff98;font-size:12px;text-transform:uppercase}.drill-card{border:1px solid #416d4b;background:#102018;border-radius:16px;padding:15px;margin:12px 0}.drill-progress{font-size:28px;letter-spacing:.16em;color:var(--green);margin:10px 0}.drill-stats{color:var(--muted)}.related-row{display:flex;flex-direction:column;gap:7px}.related-op{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:11px;padding:10px;text-align:left}
.quick-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.toast{position:fixed;left:50%;bottom:94px;transform:translateX(-50%);z-index:90;background:#243129;border:1px solid var(--line);padding:10px 14px;border-radius:12px;display:none}.about p{color:var(--muted)}
.bottom{position:fixed;z-index:50;left:0;right:0;bottom:0;background:rgba(7,16,12,.98);border-top:1px solid var(--line);padding:7px max(7px,env(safe-area-inset-right)) calc(7px + env(safe-area-inset-bottom)) max(7px,env(safe-area-inset-left));display:flex;justify-content:center}.bottom-inner{width:min(900px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.nav{border:0;background:transparent;color:var(--muted);padding:7px 2px;font-size:10px}.nav b{display:block;font-size:19px}.nav.active{color:var(--green)}
@media(max-width:620px){.scenario-grid,.plan-grid,.fight-grid{grid-template-columns:1fr}.nonneg{grid-template-columns:1fr 1fr 1fr}.replace-grid,.badgood,.roles{grid-template-columns:1fr}.hero h1{font-size:30px}.leader-call span{font-size:18px}}
</style>

<body>
<div class="shell">
<header><div class="brand"><div><strong>Search &amp; Destroy Companion</strong><small>Squad Playbook · Teamwork + Winning Fights</small></div><div class="header-actions"><button class="iconbtn" id="aboutBtn">i</button><button class="iconbtn" id="installBtn" hidden>Install</button></div></div></header>
<main id="main"></main>
</div>
<nav class="bottom"><div class="bottom-inner">
<button class="nav active" data-nav="squad"><b>♟</b>Squad</button>
<button class="nav" data-nav="calls"><b>◖</b>Calls</button>
<button class="nav" data-nav="fights"><b>✦</b>Fights</button>
<button class="nav" data-nav="manual"><b>☰</b>Manual</button>
<button class="nav" data-nav="notes"><b>✎</b>Notes</button>
</div></nav>
<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script src="teamplay_data.js"></script>
<script src="fights_data.js"></script>
<script>
const MANUAL=window.APP_DATA;const TEAM=window.TEAMPLAY_DATA;const FIGHTS=window.FIGHT_DATA;const main=document.getElementById('main');
let deferredInstall=null;let fightDrill=JSON.parse(localStorage.getItem('snd-fight-drill')||'null');
const esc=(s='')=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const toast=msg=>{const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1400)};
function setNav(name){document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.nav===name))}
function navTo(view){if(view==='squad')showSquad();if(view==='calls')showCalls();if(view==='fights')showFights();if(view==='manual')showManual();if(view==='notes')showNotes()}
document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>navTo(b.dataset.nav));document.getElementById('aboutBtn').onclick=showAbout;
function scenarioById(id){return TEAM.scenarios.find(x=>x.id===id)}function planById(id){return TEAM.plans.find(x=>x.id===id)}function fightById(id){return FIGHTS.find(x=>x.id===id)}
function showSquad(){setNav('squad');main.innerHTML=`<section class="hero"><span class="badge">TEAMPLAY FIRST</span><h1>What does the team need right now?</h1><p>Pick the problem, read one leader call, and give everyone a useful job before the next round starts.</p></section><div class="emergency"><strong>Fast reset:</strong> “Pair up. Short calls. Play the objective. No solo chase.”</div><div class="scenario-grid">${TEAM.scenarios.map(s=>`<button class="scenario-card" data-scenario="${s.id}"><span class="scenario-icon">${s.icon}</span><span><strong>${esc(s.trigger)}</strong><small>${esc(s.tag)} · ${esc(s.summary)}</small></span><span class="open-cue">Open team fix →</span></button>`).join('')}</div><div class="section-label">Round plans</div><div class="plan-grid">${TEAM.plans.map(p=>`<button class="plan-card" data-plan="${p.id}"><span class="plan-icon">${p.icon}</span><span><strong>${esc(p.name)}</strong><small>${esc(p.goal)}</small></span><span class="open-cue">Open leader script →</span></button>`).join('')}</div><div class="section-label">Three non-negotiables</div><div class="nonneg"><div><b>2</b><span>Move in pairs</span></div><div><b>4</b><span>Words per call</span></div><div><b>0</b><span>Solo hunts after plant</span></div></div>`;document.querySelectorAll('[data-scenario]').forEach(b=>b.onclick=()=>showScenario(b.dataset.scenario));document.querySelectorAll('[data-plan]').forEach(b=>b.onclick=()=>showPlan(b.dataset.plan));window.scrollTo(0,0)}
function scenarioVisual(type){const p=(x,y,c='team')=>`<circle cx="${x}" cy="${y}" r="18" class="v-${c}"/><circle cx="${x}" cy="${y-27}" r="9" class="v-${c}"/>`;const line=(x1,y1,x2,y2,c='good')=>`<path d="M${x1} ${y1} L${x2} ${y2}" class="v-${c}"/>`;const base=`<svg viewBox="0 0 460 245" role="img" aria-label="Teamplay diagram"><text x="110" y="24" text-anchor="middle" class="v-label">BAD</text><text x="350" y="24" text-anchor="middle" class="v-label">BETTER</text><line x1="230" y1="35" x2="230" y2="225" stroke="#2b3c31" stroke-width="2"/>`;let v='';
 if(type==='pair')v=`${p(55,95)}${p(110,145)}${p(165,85)}${line(55,110,165,90,'bad')}<text x="110" y="205" text-anchor="middle" class="v-small">Three isolated fights</text>${p(300,100)}${p(335,125)}${p(380,95)}${p(415,120)}${line(300,110,335,120)}${line(380,105,415,115)}<text x="350" y="205" text-anchor="middle" class="v-small">Two connected pairs</text>`;
 if(type==='comms')v=`<circle cx="110" cy="115" r="58" fill="none" stroke="#ff6670" stroke-width="6" stroke-dasharray="6 6"/><text x="110" y="94" text-anchor="middle" class="v-label">NOISE</text><text x="110" y="120" text-anchor="middle" class="v-small">story • blame • guesses</text><text x="110" y="145" text-anchor="middle" class="v-small">footsteps disappear</text><rect x="275" y="72" width="150" height="85" rx="16" fill="#183020" stroke="#6dff8c" stroke-width="3"/><text x="350" y="100" text-anchor="middle" class="v-label">2 B</text><text x="350" y="124" text-anchor="middle" class="v-small">one weak</text><text x="350" y="146" text-anchor="middle" class="v-small">moving back</text>`;
 if(type==='ego')v=`${p(105,135)}${p(105,70,'enemy')}${line(105,115,105,90,'bad')}<path d="M70 170 Q105 205 140 170" class="v-bad"/><text x="105" y="218" text-anchor="middle" class="v-small">Same peek, same timing</text>${p(325,145)}${p(375,145)}${p(350,65,'enemy')}${line(325,125,345,85)}${line(375,125,355,85)}<text x="350" y="218" text-anchor="middle" class="v-small">Two guns change the fight</text>`;
 if(type==='numbers')v=`${p(55,125)}${p(110,75)}${p(165,135)}${p(110,145,'enemy')}<text x="110" y="210" text-anchor="middle" class="v-small">Advantage split into 1v1s</text>${p(300,125)}${p(335,150)}${p(385,125)}${p(420,150)}${p(360,70,'enemy')}${line(300,115,350,80)}${line(385,115,370,80)}<text x="350" y="210" text-anchor="middle" class="v-small">Pairs hold the escape routes</text>`;
 if(type==='crossfire')v=`<rect x="85" y="95" width="50" height="50" class="v-objective"/><text x="110" y="126" text-anchor="middle" class="v-label">B</text>${p(55,170)}${p(165,170)}${line(55,150,110,125,'bad')}${line(165,150,110,125,'bad')}<text x="110" y="220" text-anchor="middle" class="v-small">Both chase away</text><rect x="325" y="95" width="50" height="50" class="v-objective"/><text x="350" y="126" text-anchor="middle" class="v-label">B</text>${p(285,175)}${p(415,175)}${line(285,155,350,125)}${line(415,155,350,125)}<text x="350" y="220" text-anchor="middle" class="v-small">Crossfire forces the defuse</text>`;
 if(type==='retake')v=`${p(65,70)}${p(105,115)}${p(150,165)}${line(65,85,150,150,'bad')}<rect x="90" y="180" width="40" height="35" class="v-objective"/><text x="110" y="203" text-anchor="middle" class="v-small">trickle</text>${p(305,145)}${p(345,145)}${p(385,145)}${line(305,125,350,85)}${line(345,125,350,85)}${line(385,125,350,85)}<rect x="330" y="45" width="40" height="35" class="v-objective"/><text x="350" y="68" text-anchor="middle" class="v-small">site</text><text x="350" y="215" text-anchor="middle" class="v-small">One timed wave</text>`;
 if(type==='reset')v=`<path d="M55 70 C165 40 170 170 55 180" class="v-bad"/><text x="110" y="110" text-anchor="middle" class="v-label">LAST ROUND</text><text x="110" y="138" text-anchor="middle" class="v-small">blame loops</text><path d="M285 125 L405 125" class="v-good"/><circle cx="405" cy="125" r="18" class="v-team"/><text x="350" y="90" text-anchor="middle" class="v-label">ONE FIX</text><text x="350" y="165" text-anchor="middle" class="v-small">next action only</text>`;
 if(type==='clutch')v=`${p(110,140)}<text x="48" y="70" class="v-label">LEFT!</text><text x="135" y="55" class="v-label">BEHIND!</text><text x="40" y="105" class="v-label">PUSH!</text><circle cx="110" cy="115" r="70" fill="none" stroke="#ff6670" stroke-width="5" stroke-dasharray="5 5"/><text x="110" y="220" text-anchor="middle" class="v-small">Four remote drivers</text>${p(350,140)}<rect x="275" y="55" width="150" height="45" rx="12" fill="#183020" stroke="#6dff8c"/><text x="350" y="83" text-anchor="middle" class="v-small">Last seen mid. Bomb A.</text><text x="350" y="220" text-anchor="middle" class="v-small">One fact, then silence</text>`;
 return base+v+'</svg>'}
function showScenario(id){const s=scenarioById(id);setNav('squad');main.innerHTML=`<button class="ghost" id="backSquad">← Teamplay</button><section class="detail-hero"><span class="badge">${esc(s.tag)}</span><h1>${esc(s.title)}</h1><p>${esc(s.summary)}</p></section><div class="visual">${scenarioVisual(s.visual)}</div><div class="leader-call"><strong>Say this now</strong><span>${esc(s.leaderCall)}</span></div><div class="card rule-card"><h3>One team rule</h3><p>${esc(s.rule)}</p></div><div class="card"><h3>What the squad does</h3><div class="steps">${s.steps.map(x=>`<div class="step">${esc(x)}</div>`).join('')}</div></div><div class="card"><h3>Correct without starting a fight</h3><div class="replace-grid">${s.replace.map(r=>`<div class="replace"><div class="bad">Instead of: “${esc(r[0])}”</div><div class="good">Say: “${esc(r[1])}”</div></div>`).join('')}</div></div><div class="card"><h3>Avoid</h3><p>${esc(s.avoid)}</p></div>`;document.getElementById('backSquad').onclick=showSquad;window.scrollTo(0,0)}
function showPlan(id){const p=planById(id);setNav('squad');main.innerHTML=`<button class="ghost" id="backSquad">← Round plans</button><section class="detail-hero"><span class="badge">${esc(p.side)}</span><h1>${esc(p.name)}</h1><p>${esc(p.goal)}</p></section><div class="leader-call"><strong>10-second leader script</strong><span>${esc(p.call)}</span></div><div class="card"><h3>Five jobs</h3><div class="roles">${p.roles.map(r=>`<div class="role"><strong>${esc(r[0])}</strong><span>${esc(r[1])}</span></div>`).join('')}</div></div><div class="card"><h3>Round rules</h3><div class="rule-pills">${p.rules.map(r=>`<span class="rule-pill">${esc(r)}</span>`).join('')}</div></div><div class="card accent"><h3>How to get buy-in</h3><p>Give each player a clear job instead of telling the whole team to “play smarter.” Short assignments feel useful; lectures feel like blame.</p></div>`;document.getElementById('backSquad').onclick=showSquad;window.scrollTo(0,0)}
function showCalls(){setNav('calls');main.innerHTML=`<section class="hero"><span class="badge">COMMS DISCIPLINE</span><h2>Say less. Give better information.</h2><p>A useful call tells a teammate where to aim or what decision to make. Then it ends.</p></section><div class="card accent"><h3>The four-part call</h3><p><strong>Count + place + movement + damage.</strong></p><p>Example: “Two B, pushing in, one weak.”</p></div><div class="calls-list">${TEAM.comms.map(c=>`<div class="call-card"><h3>${esc(c.title)}</h3><div class="formula">${esc(c.formula)}</div><div class="badgood"><div class="bad"><strong>Noise</strong>${esc(c.bad)}</div><div class="good"><strong>Useful</strong>${esc(c.good)}</div></div></div>`).join('')}</div><div class="card"><h3>Dead-player rule</h3><p>Give confirmed information once. Do not guess, coach every movement, replay the death, or argue while the round is alive.</p></div>`;window.scrollTo(0,0)}
function showFights(){setNav('fights');main.innerHTML=`<section class="hero"><span class="badge">WINNING FIGHTS</span><h2>How did the fight go wrong?</h2><p>Pick the closest problem. Get one correction and one five-round drill.</p></section><div class="fight-grid">${FIGHTS.map(f=>`<button class="fight-card" data-fight="${f.id}"><span class="fight-tag">${esc(f.tag)}</span><span><strong>${esc(f.trigger)}</strong><small>${esc(f.correction)}</small></span><span class="open-cue">Open correction →</span></button>`).join('')}</div>`;document.querySelectorAll('[data-fight]').forEach(b=>b.onclick=()=>showFight(b.dataset.fight));window.scrollTo(0,0)}
function fightVisual(type){const person=(x,y,c='#6dff8c')=>`<circle cx="${x}" cy="${y-35}" r="11" fill="${c}"/><path d="M${x} ${y-22}v36m-22-15h44m-30 35-12 28m24-28 12 28" stroke="${c}" stroke-width="7" stroke-linecap="round" fill="none"/>`;const arrow=(x1,y1,x2,y2,c='#6dff8c')=>`<defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8z" fill="${c}"/></marker></defs><line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c}" stroke-width="6" marker-end="url(#a)"/>`;const start='<svg viewBox="0 0 420 245" role="img" aria-label="Gunfight correction diagram"><text x="105" y="28" text-anchor="middle" class="v-label">BAD</text><text x="315" y="28" text-anchor="middle" class="v-label">BETTER</text><line x1="210" y1="38" x2="210" y2="225" stroke="#2b3c31" stroke-width="2"/>';let v='';
 if(type==='preaim')v=`${person(70,165)}${person(165,100,'#ff6670')}<line x1="80" y1="155" x2="155" y2="110" class="v-bad"/><text x="105" y="215" text-anchor="middle" class="v-small">Weapon rises after contact</text>${person(275,165)}${person(375,100,'#ff6670')}${arrow(300,145,360,105)}<text x="315" y="215" text-anchor="middle" class="v-small">Aim before exposure</text>`;
 if(type==='accuracy')v=`${person(70,165)}${person(160,100,'#ff6670')}<path d="M90 140q35-70 70-15" class="v-bad"/><text x="105" y="215" text-anchor="middle" class="v-small">Large correction and spray</text>${person(275,165)}${person(375,100,'#ff6670')}${arrow(300,145,360,108)}<text x="315" y="215" text-anchor="middle" class="v-small">Crosshair starts near target</text>`;
 if(type==='strafe')v=`${person(105,165)}${person(165,100,'#ff6670')}<text x="105" y="215" text-anchor="middle" class="v-small">Feet stop in the open</text>${person(315,165)}${person(375,100,'#ff6670')}${arrow(275,180,340,180)}<text x="315" y="215" text-anchor="middle" class="v-small">Short strafe toward cover</text>`;
 if(type==='repeek')v=`<rect x="85" y="70" width="35" height="140" fill="#27342c"/>${person(75,165)}${person(165,100,'#ff6670')}<path d="M70 145q40-70 85-35" class="v-bad"/><text x="105" y="225" text-anchor="middle" class="v-small">Same place, same timing</text><rect x="295" y="70" width="35" height="140" fill="#27342c"/>${person(275,165)}${person(375,100,'#ff6670')}${arrow(285,145,340,105)}<text x="315" y="225" text-anchor="middle" class="v-small">Delay or change position</text>`;
 if(type==='cover')v=`${person(105,165)}${person(45,100,'#ff6670')}${person(165,100,'#ff6670')}<text x="105" y="215" text-anchor="middle" class="v-small">Several guns see you</text><rect x="300" y="65" width="35" height="145" fill="#27342c"/>${person(280,165)}${person(380,100,'#ff6670')}${arrow(300,145,365,105)}<text x="315" y="215" text-anchor="middle" class="v-small">Cover hides the other angle</text>`;
 if(type==='trade')v=`${person(70,165)}${person(165,100,'#ff6670')}<text x="105" y="215" text-anchor="middle" class="v-small">Reload in the live lane</text>${person(275,165)}${person(375,100,'#ff6670')}${arrow(300,145,355,112)}<text x="315" y="215" text-anchor="middle" class="v-small">Break sight before reload</text>`;
 if(type==='chase')v=`${person(70,165)}${person(145,115,'#ff6670')}${person(180,95,'#ffd166')}${arrow(75,155,135,120,'#ff6670')}<text x="105" y="215" text-anchor="middle" class="v-small">Run into unknown support</text><rect x="300" y="80" width="32" height="130" fill="#27342c"/>${person(275,165)}${person(380,105,'#ff6670')}${arrow(365,120,335,120)}<text x="315" y="215" text-anchor="middle" class="v-small">Hold the escape route</text>`;
 if(type==='panic')v=`${person(105,160)}<text x="105" y="80" text-anchor="middle" class="v-small">AIM • CROUCH • SWAP</text><text x="105" y="100" text-anchor="middle" class="v-small">RELOAD • JUMP • RUN</text><circle cx="105" cy="130" r="34" fill="none" stroke="#ff6670" stroke-width="6" stroke-dasharray="5 5"/><text x="105" y="215" text-anchor="middle" class="v-small">Too many decisions</text>${person(315,160)}<rect x="245" y="65" width="140" height="35" rx="10" fill="#183020" stroke="#6dff8c"/><text x="315" y="88" text-anchor="middle" class="v-label">FIGHT</text><text x="315" y="125" text-anchor="middle" class="v-small">or BACK OUT</text><text x="315" y="148" text-anchor="middle" class="v-small">or GATHER INFO</text><text x="315" y="215" text-anchor="middle" class="v-small">Choose before doorway</text>`;
 if(type==='reload')v=`${person(70,165)}${person(170,110,'#ffd166')}<rect x="95" y="95" width="25" height="55" rx="4" fill="#ff6670"/><text x="105" y="215" text-anchor="middle" class="v-small">Reload while lane is live</text><rect x="280" y="70" width="35" height="140" fill="#27342c"/>${person(265,165)}${person(380,110,'#ffd166')}<text x="315" y="215" text-anchor="middle" class="v-small">Cover, check, then reload</text>`;
 if(type==='isolate')v=`${person(105,165)}${person(45,100,'#ff6670')}${person(165,100,'#ff6670')}<text x="105" y="215" text-anchor="middle" class="v-small">Both enemies shoot together</text><rect x="300" y="70" width="38" height="140" fill="#27342c"/>${person(280,165)}${person(380,100,'#ff6670')}${person(345,75,'#ff6670')}<text x="315" y="215" text-anchor="middle" class="v-small">Hide one, fight one</text>`;
 return start+v+'</svg>'}
function showFight(id){const f=fightById(id);if(!f)return;setNav('fights');const active=fightDrill&&fightDrill.id===id;const boxes=active?[0,1,2,3,4].map(i=>i<fightDrill.rounds?'■':'□').join(' '):'';main.innerHTML=`<button class="ghost" id="backFights">← Winning Fights</button><section class="fight-hero"><span class="badge">${esc(f.tag)}</span><h1>${esc(f.title)}</h1><p>${esc(f.summary)}</p></section><div class="fight-diagram">${fightVisual(f.visual)}</div><div class="fight-legend"><div><strong>What went wrong</strong><span>${esc(f.summary)}</span></div><div><strong>Correction</strong><span>${esc(f.correction)}</span></div></div><div class="cue-card"><strong>Mid-round cue</strong><span>${esc(f.cue)}</span></div><div class="card"><h3>Four-step correction</h3><div class="fight-steps">${f.steps.map(x=>`<div class="fight-step">${esc(x)}</div>`).join('')}</div></div><div class="drill-card"><span class="badge">ONE-MISSION DRILL</span><h3>${esc(f.mission)}</h3>${active?`<div class="drill-progress">${boxes}</div><div class="drill-stats">${fightDrill.successes} clean executions in ${fightDrill.rounds} rounds</div><div class="quick-buttons"><button class="primary" id="drillYes">Clean execution</button><button class="ghost" id="drillNo">Missed it</button><button class="ghost" id="endDrill">End drill</button></div>`:`<div class="quick-buttons"><button class="primary" id="startDrill">Start 5-round drill</button></div>`}</div><div class="card"><h3>Related field operations</h3><div class="related-row">${f.relatedOps.map(n=>{const o=MANUAL.operations.find(x=>x.id===n);return o?`<button class="related-op" data-related-op="${n}">Operation ${String(n).padStart(2,'0')}: ${esc(o.title)}</button>`:''}).join('')}</div></div>`;document.getElementById('backFights').onclick=showFights;const start=document.getElementById('startDrill'),yes=document.getElementById('drillYes'),no=document.getElementById('drillNo'),end=document.getElementById('endDrill');if(start)start.onclick=()=>startFightDrill(id);if(yes)yes.onclick=()=>recordFightRound(true);if(no)no.onclick=()=>recordFightRound(false);if(end)end.onclick=endFightDrill;document.querySelectorAll('[data-related-op]').forEach(b=>b.onclick=()=>showOperation(Number(b.dataset.relatedOp)));window.scrollTo(0,0)}
function startFightDrill(id){fightDrill={id,rounds:0,successes:0};localStorage.setItem('snd-fight-drill',JSON.stringify(fightDrill));showFight(id);toast('5-round drill started')}function recordFightRound(ok){if(!fightDrill)return;fightDrill.rounds=Math.min(5,fightDrill.rounds+1);if(ok)fightDrill.successes++;localStorage.setItem('snd-fight-drill',JSON.stringify(fightDrill));if(fightDrill.rounds>=5)toast(`Drill complete: ${fightDrill.successes}/5 clean`);showFight(fightDrill.id)}function endFightDrill(){fightDrill=null;localStorage.removeItem('snd-fight-drill');showFights();toast('Fight drill ended')}
function manualRow(op){return `<button class="row" data-op="${op.id}"><strong>${esc(op.title)}</strong><small>Operation ${String(op.id).padStart(2,'0')} · ${esc(op.mission)}</small></button>`}function bindManualRows(){document.querySelectorAll('[data-op]').forEach(b=>b.onclick=()=>showOperation(Number(b.dataset.op)))}
function showManual(){setNav('manual');main.innerHTML=`<section class="hero"><span class="badge">FIELD MANUAL</span><h2>Fix the problem between rounds</h2><p>Thirty operations covering decisions, gunfights, bomb play, pressure, and improvement.</p></section><input class="search" id="manualSearch" placeholder="Search dying first, re-peeking, post-plant..."><div class="manual-list" id="manualList">${MANUAL.operations.map(manualRow).join('')}</div>`;bindManualRows();document.getElementById('manualSearch').oninput=e=>{const q=e.target.value.toLowerCase();document.getElementById('manualList').innerHTML=MANUAL.operations.filter(o=>JSON.stringify(o).toLowerCase().includes(q)).map(manualRow).join('');bindManualRows()};window.scrollTo(0,0)}
function showOperation(id){const o=MANUAL.operations.find(x=>x.id===id);setNav('manual');const box=(h,v)=>`<div class="card"><h3>${esc(h)}</h3><p>${esc(v)}</p></div>`;main.innerHTML=`<button class="ghost" id="backManual">← Field manual</button><section class="hero"><span class="badge">OPERATION ${String(o.id).padStart(2,'0')}</span><h2>${esc(o.title)}</h2></section>${box('The problem',o.problem)}${box('The truth',o.truth)}${box('One thing to try',o.try)}${box('Mission',o.mission)}${box('Success looks like',o.success)}`;document.getElementById('backManual').onclick=showManual;window.scrollTo(0,0)}
function showNotes(){setNav('notes');const saved=localStorage.getItem('snd-squad-notes')||'';main.innerHTML=`<section class="hero"><span class="badge">SQUAD NOTES</span><h2>Your team’s rules and aliases</h2><p>Store the calls your group agrees to use. Saved only on this device.</p></section><textarea id="squadNotes" class="notearea" placeholder="Example:\n• Dead comms: one fact, then silence\n• Entry + trade always paired\n• After plant: no hunting\n• Our short names for roles..."></textarea><div class="quick-buttons"><button class="primary" id="saveNotes">Save notes</button><button class="ghost" id="clearNotes">Clear</button></div><div class="card"><h3>Suggested team agreement</h3><p>We correct the next action instead of attacking the player. We use short confirmed calls. We protect trades, bomb, numbers, and time before personal kills.</p></div>`;document.getElementById('squadNotes').value=saved;document.getElementById('saveNotes').onclick=()=>{localStorage.setItem('snd-squad-notes',document.getElementById('squadNotes').value);toast('Squad notes saved')};document.getElementById('clearNotes').onclick=()=>{document.getElementById('squadNotes').value='';localStorage.removeItem('snd-squad-notes');toast('Notes cleared')};window.scrollTo(0,0)}
function showAbout(){setNav('');main.innerHTML=`<button class="ghost" id="backHome">← Back</button><section class="hero"><span class="badge">SQUAD PLAYBOOK 3.0</span><h2>Help five players act like one team</h2></section><div class="card about"><p><strong>Created by Michael Barnes.</strong></p><p>Copyright © 2026 Michael Barnes. All Rights Reserved.</p><p>Unofficial fan-made tactical reference. Not affiliated with or endorsed by Activision.</p></div><div class="card"><h3>What changed</h3><p>The inaccurate map atlas and all packaged map images were removed. The companion now focuses on team shape, communication, trades, bomb responsibility, numbers advantages, post-plant discipline, retakes, tilt control, clutch silence, individual gunfights, and the field manual.</p></div><div class="card"><h3>Build</h3><p>Version 3.0.0 · MB-SNDC-2026-0722-030</p></div>`;document.getElementById('backHome').onclick=showSquad;window.scrollTo(0,0)}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstall=e;const b=document.getElementById('installBtn');b.hidden=false;b.onclick=async()=>{await deferredInstall.prompt();deferredInstall=null;b.hidden=true}});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));showSquad();
</script>
</body>
