.leader-call{border:1px solid #476d50;background:#16241a;border-radius:16px;padding:14px;margin:12px 0}.leader-call strong{display:block;color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.09em}.leader-call p{font-size:18px;margin:5px 0 0}
.squad-roles{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.squad-role{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:9px 6px;text-align:center}.squad-role b{display:flex;width:27px;height:27px;border-radius:50%;background:var(--accent);color:#0b120d;align-items:center;justify-content:center;margin:0 auto 6px}.squad-role strong{display:block;font-size:12px}.squad-role small{display:block;color:var(--muted);font-size:11px;line-height:1.2;margin-top:3px}
.map-source-note{font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:10px;margin-top:16px}
@media(max-width:520px){.map-library-grid{grid-template-columns:1fr 1fr}.map-library-card{min-height:105px;padding:12px}.map-library-card strong{font-size:16px}.squad-roles{grid-template-columns:repeat(3,1fr)}.cm-zone-label{font-size:15px}.cm-callout text{font-size:13px}}


.command-map{background:radial-gradient(circle at 50% 45%,#132019 0,#0c130f 70%)}
.cm-zone{filter:drop-shadow(0 2px 1px rgba(0,0,0,.35))}.cm-zone-label{opacity:.32;font-size:14px}
.cm-road{fill:none;stroke:#25352b;stroke-width:48;stroke-linecap:round;stroke-linejoin:round}.cm-road-edge{fill:none;stroke:#506157;stroke-width:2;stroke-dasharray:8 10;opacity:.5}
.cm-water{fill:#113040;stroke:#2b708b;stroke-width:3}.cm-feature{fill:#28362e;stroke:#65786b;stroke-width:2}.cm-feature-line{stroke:#8aa092;stroke-width:3;fill:none}.cm-feature-text{fill:#b8c7bd;font-size:13px;font-weight:850;text-anchor:middle;paint-order:stroke;stroke:#0a100c;stroke-width:3}
.cm-label-box{fill:#111a14;stroke:#63736a;stroke-width:1.5;opacity:.96}.cm-label-line{stroke:#c5d3ca;stroke-width:1.5;opacity:.65}.cm-callout text{font-size:14px;stroke-width:3}

</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div><h1>Search & Destroy Companion</h1><small>Mid-game reference manual</small></div>
      <button class="iconbtn" onclick="showSearch()">⌕</button>
    </div>
  </header>
  <main id="main"></main>
  <footer class="legal-footer">© 2026 Michael Barnes · All Rights Reserved · <button class="navbtn" onclick="showAbout()">About</button></footer>
</div>

<div class="bottomnav">
  <div class="bottomnav-inner">
    <button class="navbtn active" data-tab="home" onclick="showHome()"><b>⌂</b>Home</button>
    <button class="navbtn" data-tab="browse" onclick="showBrowse()"><b>☰</b>Browse</button>
    <button class="navbtn" data-tab="practice" onclick="showPractice()"><b>◎</b>Practice</button>
    <button class="navbtn" data-tab="favorites" onclick="showFavorites()"><b>★</b>Saved</button>
    <button class="navbtn" data-tab="notes" onclick="showNotes()"><b>✎</b>Notes</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="visual_maps.js"></script>
<script>
const D = window.APP_DATA;
const APP_OWNER = 'Michael Barnes';
const APP_VERSION = '1.0';
const BUILD_ID = 'MB-SNDC-2026-0721-010';
const COPYRIGHT_NOTICE = 'Copyright © 2026 Michael Barnes. All Rights Reserved.';
const main = document.getElementById('main');
const $ = s => document.querySelector(s);
const state = {
  favorites: JSON.parse(localStorage.getItem('snd-favorites')||'[]'),
  notes: JSON.parse(localStorage.getItem('snd-notes')||'[]'),
  practice: JSON.parse(localStorage.getItem('snd-practice')||'null')
};
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setTab(name){document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name))}
function toast(msg){const t=$('#toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1400)}
function opById(id){return D.operations.find(o=>o.id===Number(id))}
function opRow(op){return `<button class="row" onclick="showOperation(${op.id})"><strong>${esc(op.title)}</strong><small>Operation ${String(op.id).padStart(2,'0')}</small></button>`}

function showHome(){
 setTab('home');
 main.innerHTML=`<section class="hero"><h2>What just happened?</h2><p>Tap the closest problem. The app will point you toward the useful page instead of making you remember chapter numbers like some kind of tactical librarian.</p></section>
 <div class="grid">${D.diagnosis.map(d=>`<button class="bigbtn" onclick='showDiagnosis(${JSON.stringify(d.label)})'><strong>${esc(d.label)}</strong><span>${d.ops.length} relevant operations</span></button>`).join('')}</div>
 <div class="section-title">Quick access</div>
 <div class="grid">
   <button class="bigbtn" onclick="showMapGuide()"><strong>Visual Map Guide</strong><span>14 visual maps</span></button>
   <button class="bigbtn" onclick="showDictionary()"><strong>Field Dictionary</strong><span>Find a term fast</span></button>
   <button class="bigbtn" onclick="showPractice()"><strong>Today's Practice</strong><span>One mission, not twelve</span></button>
   <button class="bigbtn" onclick="showBrowse()"><strong>All Operations</strong><span>Browse the field manual</span></button>
 </div>`;
 window.scrollTo(0,0);
}
function showDiagnosis(label){
 const d=D.diagnosis.find(x=>x.label===label);
 setTab('home');
 main.innerHTML=`<button class="action back" onclick="showHome()">← Back</button>
 <section class="operation-head"><div class="num">Quick diagnosis</div><h2>${esc(label)}</h2><p>Start with the first result. The others are nearby causes worth checking.</p></section>
 <div class="list">${d.ops.map(id=>opRow(opById(id))).join('')}</div>`;
 window.scrollTo(0,0);
}
function showBrowse(){
 setTab('browse');
 main.innerHTML=`<section class="hero"><h2>Browse by problem</h2><p>Titles first, numbers second. Civilization survives another minor interface improvement.</p></section>
 ${Object.entries(D.categories).map(([name,ids])=>`<div class="section-title">${esc(name)}</div><div class="list">${ids.map(id=>opRow(opById(id))).join('')}</div>`).join('')}
 <div class="section-title">Reference</div>
 <div class="list">
 <button class="row" onclick="showMapGuide()"><strong>Visual Map Guide</strong><small>14 visual maps</small></button>
 <button class="row" onclick="showDictionary()"><strong>Field Dictionary</strong><small>${D.dictionary.length} terms</small></button>
 </div>`;
 window.scrollTo(0,0);
}
function showOperation(id){
 const o=opById(id); setTab('browse');
 const fav=state.favorites.includes(id);
 main.innerHTML=`<button class="action back" onclick="history.back()">← Back</button>
 <section class="operation-head"><div class="num">Operation ${String(o.id).padStart(2,'0')}</div><h2>${esc(o.title)}</h2>
 <div class="actionbar">
 <button class="action ${fav?'active':''}" onclick="toggleFavorite(${id})">${fav?'★ Saved':'☆ Save'}</button>
 <button class="action" onclick="startPractice(${id})">◎ Practice this</button>
 </div></section>
 ${card('The Problem',o.problem)}
 ${card('The Truth',o.truth)}
 ${listCard('Common Causes',o.causes)}
 ${card('One Thing to Try',o.try)}
 ${card('Why It Helps',o.why)}
 ${card('Mission',o.mission)}
 ${listCard('Observe',o.observe)}
 ${card('Success Looks Like This',o.success)}
 <div class="card"><h3>Field Note</h3><textarea id="opnote" class="notearea" placeholder="What happened in the match?"></textarea><br><button class="action" onclick="saveOpNote(${id})">Save note</button></div>`;
 history.pushState({view:'op',id},'',`#op-${id}`);
 window.scrollTo(0,0);
}
function card(t,b){return `<div class="card"><h3>${esc(t)}</h3><p>${esc(b)}</p></div>`}
function listCard(t,arr){return `<div class="card"><h3>${esc(t)}</h3><ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`}
function toggleFavorite(id){
 const i=state.favorites.indexOf(id);
 if(i>=0)state.favorites.splice(i,1);else state.favorites.push(id);
 localStorage.setItem('snd-favorites',JSON.stringify(state.favorites));
 toast(i>=0?'Removed from saved':'Saved');
 showOperation(id);
}
function showFavorites(){
 setTab('favorites');
 const ops=state.favorites.map(opById).filter(Boolean);
 main.innerHTML=`<section class="hero"><h2>Saved Operations</h2><p>Your recurring trouble spots, gathered conveniently in one place like a tiny museum of avoidable deaths.</p></section>
 <div class="list">${ops.length?ops.map(opRow).join(''):'<div class="empty">No saved operations yet.</div>'}</div>`;
 window.scrollTo(0,0);
}
function startPractice(id){
 const o=opById(id);
 state.practice={id, rounds:0, remembered:0};
 localStorage.setItem('snd-practice',JSON.stringify(state.practice));
 toast('Practice mission started');
 showPractice();
}
function showPractice(){
 setTab('practice');
 if(!state.practice){
   main.innerHTML=`<section class="hero"><h2>Today's Practice</h2><p>Pick one mission. Improving everything simultaneously remains a charming human fantasy.</p></section>
   <div class="list">${D.operations.slice(0,8).map(o=>`<button class="row" onclick="startPractice(${o.id})"><strong>${esc(o.title)}</strong><small>${esc(o.mission)}</small></button>`).join('')}</div>`;
 } else {
   const o=opById(state.practice.id);
   const boxes=[0,1,2,3,4].map(i=>i<state.practice.rounds?'■':'□').join(' ');
   main.innerHTML=`<section class="operation-head"><div class="num">Today's focus</div><h2>${esc(o.title)}</h2></section>
   ${card('Mission',o.mission)}
   <div class="card"><h3>Progress</h3><p style="font-size:28px;letter-spacing:.15em">${boxes}</p><p>${state.practice.remembered} remembered out of ${state.practice.rounds} rounds</p>
   <div class="actionbar"><button class="action" onclick="recordRound(true)">Yes, remembered</button><button class="action" onclick="recordRound(false)">No, forgot</button></div></div>
   <button class="action" onclick="clearPractice()">End practice</button>`;
 }
 window.scrollTo(0,0);
}
function recordRound(ok){
 state.practice.rounds=Math.min(5,state.practice.rounds+1);
 if(ok)state.practice.remembered++;
 localStorage.setItem('snd-practice',JSON.stringify(state.practice));
 showPractice();
}
function clearPractice(){state.practice=null;localStorage.removeItem('snd-practice');showPractice()}
function saveOpNote(id){
 const text=$('#opnote').value.trim();
 if(!text)return;
 state.notes.unshift({id,text,date:new Date().toLocaleString()});
 localStorage.setItem('snd-notes',JSON.stringify(state.notes));
 toast('Note saved');
 $('#opnote').value='';
}
function showNotes(){
 setTab('notes');
 main.innerHTML=`<section class="hero"><h2>Field Notes</h2><p>Your observations live on this device.</p></section>
 <div class="list">${state.notes.length?state.notes.map((n,i)=>{const o=opById(n.id);return `<div class="card"><h3>${esc(o?o.title:'General note')}</h3><p>${esc(n.text)}</p><small style="color:var(--muted)">${esc(n.date)}</small><br><button class="action" onclick="deleteNote(${i})">Delete</button></div>`}).join(''):'<div class="empty">No field notes yet.</div>'}</div>`;
 window.scrollTo(0,0);
}
function deleteNote(i){state.notes.splice(i,1);localStorage.setItem('snd-notes',JSON.stringify(state.notes));showNotes()}


const VMAPS = window.VISUAL_MAPS;
let activeMapId = 'raid';
let activeMapMode = 'callouts';
let activeCallout = null;

function mapTierClass(tier){return tier.includes('competitive')?'':' staple'}
function showMapGuide(mapId=null,mode='callouts'){
 if(mapId){showVisualMap(mapId,mode);return}
 setTab('browse');
 const comp=Object.values(VMAPS).filter(m=>m.tier.includes('competitive'));
 const staples=Object.values(VMAPS).filter(m=>!m.tier.includes('competitive'));
 const card=m=>`<button class="map-library-card" onclick="showVisualMap('${m.id}','callouts')"><span class="rotation-badge${mapTierClass(m.tier)}">${esc(m.tier)}</span><strong>${esc(m.name)}</strong><small>${esc(m.description)}</small></button>`;
 main.innerHTML=`<section class="hero"><span class="rotation-badge">Squad Command Atlas</span><h2>Choose the map</h2><p>Pull up the selected map, expand it, and direct the squad from the same visual board.</p></section>
 <div class="card"><h3>Verified 2026 S&amp;D rotation</h3><p>Tunisia, Firing Range, Coastal, Slums, and Meltdown are the official 2026 competitive Search &amp; Destroy pool. Raid is included because you requested it and it remains a core Ranked reference. The extra library covers the common Ranked staples most likely to appear in map voting.</p></div>
 <div class="section-title">2026 competitive S&amp;D</div><div class="map-library-grid">${comp.map(card).join('')}</div>
 <div class="section-title">Ranked staples</div><div class="map-library-grid">${staples.map(card).join('')}</div>`;
 window.scrollTo(0,0);
}
function showVisualMap(mapId='raid',mode='callouts'){
 activeMapId=mapId;activeMapMode=mode;activeCallout=null;setTab('browse');
 const m=VMAPS[mapId];
 main.innerHTML=`<button class="action back" onclick="showMapGuide()">← All maps</button>
 <section class="map-command-head"><div><span class="rotation-badge${mapTierClass(m.tier)}">${esc(m.tier)}</span><h2>${esc(m.name)}</h2><p class="map-meta">${esc(m.description)}</p></div><button class="action" onclick="cycleMap('${mapId}')">Next map →</button></section>
 <div class="map-mode-tabs">
 ${[['callouts','Callouts'],['attackA','Attack A'],['attackB','Attack B'],['defense','Defense'],['sightlines','Sightlines']].map(([id,label])=>`<button class="map-mode ${mode===id?'active':''}" onclick="showVisualMap('${mapId}','${id}')">${label}</button>`).join('')}
 </div>
 <div id="map-stage" class="map-stage"><div class="map-tools"><small>Tap a red or purple position for details.</small><button class="action" onclick="toggleMapExpand()">⛶ Expand</button></div>${renderCommandMap(m,mode)}<div class="map-legend-v1"><span><i class="lg site"></i>Bomb</span><span><i class="lg hold"></i>Site callout</span><span><i class="lg mid"></i>Mid callout</span><span><i class="lg route"></i>Squad route</span><span><i class="lg los"></i>Sightline</span></div></div>
 ${renderLeaderPlan(m,mode)}
 <div id="callout-detail" class="card callout-sheet"><div class="kind">Live map detail</div><h3>Tap a position on the map</h3><p>The selected callout will show what it watches and the simplest way to deal with it.</p></div>
 <div class="card"><h3>Squad note</h3><textarea id="mapnote" class="notearea" placeholder="Your team’s alias, route, timing, or correction"></textarea><br><button class="action" onclick="saveMapNote('${mapId}')">Save ${esc(m.name)} note</button></div>
 <p class="map-source-note">Original tactical schematic, not official map artwork and not drawn to exact scale. Callouts are general competitive/community language; squads may use shorter aliases.</p>`;
 window.scrollTo(0,0);
}
function cycleMap(id){const ids=Object.keys(VMAPS),i=ids.indexOf(id);showVisualMap(ids[(i+1)%ids.length],'callouts')}
function toggleMapExpand(){const s=$('#map-stage');s.classList.toggle('expanded');const b=s.querySelector('.map-tools button');b.textContent=s.classList.contains('expanded')?'✕ Close':'⛶ Expand'}
function polyline(points){return points.map(p=>p.join(',')).join(' ')}

function jaggedPoints(z){
 const n=Math.max(8,Math.min(26,z.w*.07));
 return `${z.x+n},${z.y} ${z.x+z.w-n},${z.y} ${z.x+z.w},${z.y+n} ${z.x+z.w},${z.y+z.h*.42} ${z.x+z.w-n*.55},${z.y+z.h*.50} ${z.x+z.w},${z.y+z.h*.58} ${z.x+z.w},${z.y+z.h-n} ${z.x+z.w-n},${z.y+z.h} ${z.x+n},${z.y+z.h} ${z.x},${z.y+z.h-n} ${z.x},${z.y+z.h*.58} ${z.x+n*.55},${z.y+z.h*.50} ${z.x},${z.y+z.h*.42} ${z.x},${z.y+n}`;
}

 'kurohana':`<path class="cm-road" d="M80 350 L820 350"/><path class="cm-road" d="M445 90 L445 530"/><rect class="cm-feature" x="90" y="145" width="190" height="190" rx="20"/><rect class="cm-feature" x="620" y="145" width="190" height="190" rx="20"/><rect class="cm-feature" x="345" y="170" width="200" height="200" rx="28"/><path class="cm-feature-line" d="M360 185h170v170H360z M395 185v170 M470 185v170"/><text class="cm-feature-text" x="185" y="240">LAB</text><text class="cm-feature-text" x="715" y="240">STATION</text><text class="cm-feature-text" x="445" y="275">PLAZA</text>`,
 express:`<path class="cm-feature-line" d="M70 250H830 M70 390H830"/><path class="cm-feature" d="M100 270h700v100H100z"/><path class="cm-feature-line" d="M150 270v100 M250 270v100 M350 270v100 M450 270v100 M550 270v100 M650 270v100 M750 270v100"/><path class="cm-road" d="M445 90 L445 530"/><rect class="cm-feature" x="90" y="135" width="190" height="100" rx="14"/><rect class="cm-feature" x="620" y="135" width="190" height="100" rx="14"/><text class="cm-feature-text" x="450" y="325">TRAIN / PLATFORM</text><text class="cm-feature-text" x="185" y="190">CONTROL</text><text class="cm-feature-text" x="715" y="190">TICKET</text>`
 };
 return f[id]||'';
}
function renderCommandMap(m,mode){
 const zones=m.zones.map(z=>`<polygon class="cm-zone cm-zone-${z.kind}" points="${jaggedPoints(z)}"></polygon><text class="cm-zone-label" x="${z.x+z.w/2}" y="${z.y+z.h/2}">${esc(z.label)}</text>`).join('');
 const defs=`<defs><pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0H0V30" fill="none" stroke="#26332b" stroke-width="1" opacity=".3"/></pattern><marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#7cff8d"/></marker><marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#49a4ff"/></marker></defs><rect width="900" height="620" fill="url(#gridPattern)"/>`;
 const sites=Object.entries(m.sites).map(([k,p])=>`<circle class="cm-site" cx="${p[0]}" cy="${p[1]}" r="28"></circle><text class="cm-site-label" x="${p[0]}" y="${p[1]+1}">${k}</text>`).join('');
 const sp=Object.entries(m.spawns).map(([k,p])=>`<circle class="cm-spawn" cx="${p[0]}" cy="${p[1]}" r="11"></circle><text class="cm-spawn-label" x="${p[0]}" y="${p[1]+(k==='attack'?25:-18)}">${k==='attack'?'ATTACK':'DEFENSE'}</text>`).join('');
 let overlays='';
 if(mode==='attackA'||mode==='attackB'||mode==='defense'){
   const rs=m.routes[mode]||[]; overlays+=rs.map((r,i)=>`<polyline class="cm-route ${i%2?'alt':''}" points="${polyline(r.points)}"></polyline>`).join('');
 }
 if(mode==='sightlines') overlays+=m.sightlines.map(s=>`<line class="cm-los" x1="${s.a[0]}" y1="${s.a[1]}" x2="${s.b[0]}" y2="${s.b[1]}"></line>`).join('');
 const visible=m.callouts.filter(x=>mode==='callouts'||mode==='sightlines'||mode==='defense'||(mode==='attackA'?(x.side==='A'||x.side==='MID'):(x.side==='B'||x.side==='MID')));
 const calls=visible.map(x=>{const lx=x.x+x.dx,ly=x.y+x.dy,w=Math.max(50,x.name.length*8.2+16);return `<g class="cm-callout ${x.side==='MID'?'mid':''}" onclick="showMapCallout('${m.id}',${JSON.stringify(x.name)})"><line class="cm-label-line" x1="${x.x}" y1="${x.y}" x2="${lx}" y2="${ly-2}"></line><rect class="cm-label-box" x="${lx-w/2}" y="${ly-18}" width="${w}" height="24" rx="8"></rect><circle cx="${x.x}" cy="${x.y}" r="10"></circle><text x="${lx}" y="${ly-2}">${esc(x.name)}</text></g>`}).join('');
 return `<svg class="command-map" viewBox="0 0 900 620" role="img" aria-label="${esc(m.name)} tactical command map">${defs}${zones}${mapFeatureSvg(m.id)}${overlays}${sites}${sp}${calls}</svg>`;
}
function renderLeaderPlan(m,mode){
 const key=mode==='attackA'?'attackA':mode==='attackB'?'attackB':'defense';
 const p=m.plans[key];
 return `<div class="leader-call"><strong>Team leader call • ${esc(p.title)}</strong><p>${esc(p.call)}</p></div><div class="squad-roles">${p.roles.map((r,i)=>`<div class="squad-role"><b>${i+1}</b><strong>${esc(r[0])}</strong><small>${esc(r[1])}</small></div>`).join('')}</div>`;
}
function showMapCallout(mapId,name){
 const m=VMAPS[mapId],c=m.callouts.find(x=>x.name===name);if(!c)return;activeCallout=name;
 document.querySelectorAll('.cm-callout').forEach(g=>g.classList.toggle('selected',g.textContent.trim()===name));
 const el=$('#callout-detail');
 el.innerHTML=`<div class="kind">${esc(c.side)} • ${esc(c.kind)}</div><h3>${esc(c.name)}</h3><p>${esc(c.summary)}</p><p><strong>Watches:</strong> ${esc(c.watch)}</p><p><strong>Simple counter:</strong> ${esc(c.counter)}</p>`;
 el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function saveMapNote(mapId){const text=$('#mapnote').value.trim();if(!text)return;state.notes.unshift({id:0,text:`[${VMAPS[mapId].name} map] ${text}`,date:new Date().toLocaleString()});localStorage.setItem('snd-notes',JSON.stringify(state.notes));$('#mapnote').value='';toast('Map note saved')}

function showDictionary(){
 setTab('browse');
 main.innerHTML=`<section class="hero"><h2>Field Dictionary</h2><p>Search the term you heard before pretending everybody else already knew it.</p></section>
 <input class="search" id="dictq" placeholder="Search terms..." oninput="filterDictionary()">
 <div id="dictlist" class="list" style="margin-top:12px">${dictRows(D.dictionary)}</div>`;
 window.scrollTo(0,0);
}
function dictRows(items){return items.map(x=>`<div class="card"><h3>${esc(x.term)}</h3><p>${esc(x.definition)}</p></div>`).join('')}
function filterDictionary(){
 const q=$('#dictq').value.toLowerCase();
 $('#dictlist').innerHTML=dictRows(D.dictionary.filter(x=>(x.term+' '+x.definition).toLowerCase().includes(q)));
}
function showSearch(){
 setTab('');
 main.innerHTML=`<section class="hero"><h2>Search</h2><p>Search titles, problems, missions, and dictionary terms.</p></section>
 <input class="search" id="searchq" placeholder="Type what happened..." autofocus oninput="runSearch()">
 <div id="results" class="list" style="margin-top:12px"></div>`;
 setTimeout(()=>$('#searchq').focus(),50);
}
function runSearch(){
 const q=$('#searchq').value.toLowerCase().trim();
 if(!q){$('#results').innerHTML='';return}
 const ops=D.operations.filter(o=>JSON.stringify(o).toLowerCase().includes(q)).slice(0,12);
 const terms=D.dictionary.filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,8);
 const maps=Object.values(VMAPS).filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,10);
 const callouts=Object.values(VMAPS).flatMap(m=>m.callouts.map(c=>({mapId:m.id,mapName:m.name,...c}))).filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,12);
 $('#results').innerHTML=ops.map(opRow).join('')+callouts.map(x=>`<button class="row" onclick="showVisualMap('${x.mapId}','callouts');setTimeout(()=>showMapCallout('${x.mapId}',${JSON.stringify(x.name)}),50)"><strong>${esc(x.mapName)} • ${esc(x.name)}</strong><small>${esc(x.kind)} · ${esc(x.watch)}</small></button>`).join('')+maps.map(x=>`<button class="row" onclick="showVisualMap('${x.id}','callouts')"><strong>${esc(x.name)} Command Map</strong><small>${esc(x.tier)} · callouts, routes, defense, sightlines</small></button>`).join('')+terms.map(x=>`<div class="card"><h3>${esc(x.term)}</h3><p>${esc(x.definition)}</p></div>`).join('');
}

function showAbout(){
 setTab('');
 main.innerHTML=`<button class="action back" onclick="history.back()">← Back</button>
 <section class="operation-head"><div class="num">About this app</div><h2>Search & Destroy Companion</h2></section>
 <div class="about-logo">S&amp;D</div>
 <div class="card"><h3>Original creator</h3><p>${esc(APP_OWNER)}</p></div>
 <div class="card"><h3>Version</h3><p>${esc(APP_VERSION)} · Build ${esc(BUILD_ID)}</p></div>

 <div class="card"><h3>Usage rights</h3><p class="legal-box">This application, its written field-guide content, interface structure, branding, and included source files are proprietary. No permission is granted to copy, modify, redistribute, publish, rebrand, sublicense, or sell any part of this project without written permission from the copyright holder.</p></div>
 <div class="card"><h3>Authorship fingerprint</h3><p class="legal-box">Project ID: SEARCH-DESTROY-COMPANION-MB\nBuild ID: ${esc(BUILD_ID)}\nOwner: ${esc(APP_OWNER)}</p></div>`;
 window.scrollTo(0,0);
}

window.addEventListener('popstate',e=>{ if(e.state?.view==='op')showOperation(e.state.id); else showHome(); });
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
const previewMode=new URLSearchParams(location.search).get('preview');
if(previewMode&&VMAPS[previewMode])showVisualMap(previewMode,'callouts');else showHome();
</script>
