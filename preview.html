<style>
:root{
  --bg:#0e1310; --card:#161d18; --card2:#1c251f; --text:#f5f7f5;
  --muted:#aeb8b0; --line:#2b372e; --accent:#7cff8d; --accent2:#d5ffdb;
  --warn:#ffd166; --bad:#ff7a7a;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.5}
button,input{font:inherit}
button{cursor:pointer}
.app{max-width:760px;margin:auto;min-height:100vh;padding-bottom:84px}
.topbar{position:sticky;top:0;z-index:30;background:rgba(14,19,16,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 14px calc(10px + env(safe-area-inset-top))}
.brand{display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand h1{font-size:18px;margin:0}
.brand small{display:block;color:var(--muted);font-size:12px}
.iconbtn{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:9px 11px}
main{padding:16px}
.hero{padding:8px 0 12px}
.hero h2{font-size:30px;line-height:1.08;margin:8px 0 8px}
.hero p{color:var(--muted);margin:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bigbtn{min-height:96px;text-align:left;background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:16px;padding:15px}
.bigbtn strong{display:block;font-size:17px;margin-bottom:6px}
.bigbtn span{color:var(--muted);font-size:13px}
.section-title{font-size:15px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:24px 0 10px}
.list{display:flex;flex-direction:column;gap:9px}
.row{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:14px;padding:14px}
.row strong{display:block}
.row small{color:var(--muted)}
.pill{display:inline-block;background:#203025;color:var(--accent2);border:1px solid #31523a;padding:4px 8px;border-radius:999px;font-size:12px;margin:2px 4px 2px 0}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;color:var(--text);outline:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin:10px 0}
.card h3{margin:0 0 8px;font-size:18px;color:var(--accent)}
.card p{margin:0;color:var(--text)}
.card ul{margin:8px 0 0;padding-left:22px}
.operation-head{margin:6px 0 18px}
.operation-head h2{font-size:31px;line-height:1.08;margin:8px 0}
.operation-head .num{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.1em}
.actionbar{display:flex;gap:8px;flex-wrap:wrap}
.action{border:1px solid var(--line);background:var(--card2);color:var(--text);border-radius:12px;padding:10px 12px}
.action.active{border-color:var(--accent);color:var(--accent)}
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:35;background:rgba(14,19,16,.97);border-top:1px solid var(--line);padding:8px max(8px,env(safe-area-inset-right)) calc(8px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));display:flex;justify-content:center}
.bottomnav-inner{width:min(760px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.navbtn{background:transparent;border:0;color:var(--muted);font-size:11px;padding:7px 3px}
.navbtn b{display:block;font-size:19px;line-height:1.1}
.navbtn.active{color:var(--accent)}
.back{margin-bottom:8px}
.notearea{width:100%;min-height:120px;background:#101612;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px}
.empty{color:var(--muted);padding:20px;text-align:center}
.legal-footer{margin:32px 0 8px;text-align:center;color:var(--muted);font-size:12px}.about-logo{font-size:54px;text-align:center;margin:8px 0}.legal-box{white-space:pre-wrap;font-size:13px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#27322b;color:white;border:1px solid var(--line);padding:10px 14px;border-radius:12px;display:none;z-index:60}

.map-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.map-tab{background:var(--card);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:11px 7px}
.map-tab.active{border-color:var(--accent);color:var(--accent)}
.layer-controls{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.layer-controls::-webkit-scrollbar{display:none}
.layer-btn{white-space:nowrap;border:1px solid var(--line);background:var(--card2);color:var(--muted);border-radius:999px;padding:8px 11px}
.layer-btn.active{color:var(--text);border-color:var(--accent)}
.map-shell{background:#0b0f0c;border:1px solid var(--line);border-radius:16px;padding:8px;overflow:hidden}
.tactical-map{display:block;width:100%;height:auto;background:#101612;border-radius:12px}
.map-zone{fill:#18211b;stroke:#405047;stroke-width:2}
.map-zone-label{fill:#9ba99f;font-size:17px;font-weight:700;text-anchor:middle;letter-spacing:1px;pointer-events:none}
.map-site{fill:var(--warn);stroke:#fff4c8;stroke-width:4;cursor:pointer}
.map-site-text{fill:#15150c;font-size:28px;font-weight:900;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
.map-hold{fill:#e35d6a;stroke:#ffd7dc;stroke-width:3;cursor:pointer}
.map-hold-text{fill:white;font-size:18px;font-weight:900;text-anchor:middle;dominant-baseline:middle;pointer-events:none}
.map-los{stroke:#53a8ff;stroke-width:7;stroke-linecap:round;opacity:.86;stroke-dasharray:16 10}
.map-route{stroke:#7cff8d;stroke-width:8;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.78}
.map-danger{fill:#ff9f43;opacity:.22;stroke:#ffad5c;stroke-width:4;stroke-dasharray:10 8}
.map-legend{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}
.legend-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.legend-dot{width:11px;height:11px;border-radius:50%;display:inline-block}
.map-point-card{border-left:4px solid var(--accent)}
.map-point-card h3{color:var(--text)}
.map-meta{color:var(--muted);font-size:13px}
.field-draft{display:inline-block;background:#362f16;color:#ffe59a;border:1px solid #6a5924;border-radius:999px;padding:4px 8px;font-size:12px}
.verify-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.verify-status{color:var(--muted);font-size:13px;margin-top:8px}
.map-note{font-size:13px;color:var(--muted);margin-top:8px}


.focus-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.focus-tab{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:11px 6px;font-weight:700}
.focus-tab.active{border-color:var(--accent);color:var(--accent)}
.threat-board{display:grid;grid-template-columns:1fr 1.18fr 1fr;grid-template-rows:auto auto auto;gap:8px;align-items:stretch;margin:12px 0}
.threat-card,.site-core{border:1px solid var(--line);border-radius:14px;padding:12px;background:var(--card);color:var(--text);min-height:108px;text-align:left}
.threat-card{display:flex;flex-direction:column;justify-content:center;position:relative}
.threat-card strong{font-size:15px;line-height:1.15}
.threat-card small{display:block;color:var(--muted);margin-top:5px}
.threat-card .direction{font-size:22px;color:var(--accent);line-height:1;margin-bottom:6px}
.threat-card.selected{border-color:var(--warn);background:#242117}
.site-core{grid-column:2;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--accent-bg-subtle,#1b2b20);border:2px solid var(--accent);min-height:140px}
.site-core .core-label{white-space:pre-line;font-size:21px;font-weight:900;letter-spacing:.04em}
.site-core .core-eye{font-size:30px;margin-bottom:5px}
.threat-north{grid-column:2;grid-row:1}
.threat-west{grid-column:1;grid-row:2}
.threat-east{grid-column:3;grid-row:2}
.threat-south{grid-column:2;grid-row:3}
.threat-detail{border-left:4px solid var(--warn)}
.clear-order{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.clear-step{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:7px 10px;font-size:13px}
.clear-step b{display:inline-flex;width:21px;height:21px;border-radius:50%;align-items:center;justify-content:center;background:var(--accent);color:#0d140f;font-size:12px}
.quick-rule{border:1px solid #56682a;background:#222817;border-radius:14px;padding:13px;margin:10px 0;color:#efffc5}
.map-mode-note{color:var(--muted);font-size:13px;margin:8px 0 14px}
@media(max-width:480px){
 .threat-board{grid-template-columns:1fr 1.1fr 1fr;gap:6px}
 .threat-card,.site-core{padding:9px;min-height:96px}
 .threat-card strong{font-size:13px}
 .threat-card small{font-size:11px}
 .site-core .core-label{font-size:17px}
 .focus-tab{font-size:13px}
}


.map-hub-note{color:var(--muted);font-size:13px;margin:8px 0 14px}
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.scenario-btn{min-height:104px;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:16px;padding:14px;display:flex;gap:11px;align-items:flex-start}
.scenario-btn .scenario-icon{display:flex;align-items:center;justify-content:center;min-width:42px;height:42px;border-radius:12px;background:var(--accent);color:#0d140f;font-weight:900}
.scenario-btn strong{display:block;font-size:16px;line-height:1.15}
.scenario-btn small{display:block;color:var(--muted);margin-top:5px}
.plan-banner{border:1px solid var(--line);border-radius:16px;padding:16px;background:var(--card);margin:10px 0}
.plan-banner h2{margin:4px 0 6px;font-size:27px;line-height:1.08}
.plan-banner p{margin:0;color:var(--muted)}
.plan-goal{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:12px 0}
.plan-goal>div{border:1px solid var(--line);border-radius:14px;padding:13px;background:var(--card2)}
.plan-goal strong{display:block;color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.action-flow{display:flex;flex-direction:column;gap:0;margin:14px 0}
.action-step{display:grid;grid-template-columns:48px 1fr;gap:12px;border:1px solid var(--line);border-radius:16px;padding:14px;background:var(--card)}
.action-step .step-number{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#0d140f;font-size:18px;font-weight:900}
.action-step h3{margin:0 0 4px;font-size:18px;color:var(--text)}
.action-step p{margin:0}
.action-step small{display:block;color:var(--muted);margin-top:5px}
.flow-arrow{text-align:center;color:var(--accent);font-size:25px;line-height:1;padding:3px}
.watch-strip{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.watch-chip{border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:7px 10px;font-size:13px}
.avoid-box{border:1px solid #6d3939;background:#281919;color:#ffdada;border-radius:14px;padding:13px;margin:10px 0}
.plan-actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
@media(max-width:480px){.scenario-grid{grid-template-columns:1fr}.plan-goal{grid-template-columns:1fr}.scenario-btn{min-height:90px}.plan-banner h2{font-size:24px}}

@media(max-width:480px){.grid{grid-template-columns:1fr}.hero h2{font-size:27px}.map-zone-label{font-size:13px}.map-tabs{grid-template-columns:1fr 1fr 1fr}}


/* v0.8 Common Callout Atlas: Raid, Tunisia, Coastal */
.atlas-entry{border:1px solid #496351;background:#17251b;border-radius:16px;padding:15px;margin:12px 0}
.atlas-entry strong{display:block;font-size:18px;color:var(--accent)}
.atlas-entry p{margin:5px 0 0;color:var(--muted)}
.atlas-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.atlas-tab{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:11px 6px;font-weight:700}
.atlas-tab.active{border-color:var(--accent);color:var(--accent)}
.atlas-list{display:flex;flex-direction:column;gap:9px}
.atlas-spot{width:100%;display:grid;grid-template-columns:46px 1fr auto;gap:11px;align-items:center;text-align:left;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:15px;padding:13px}
.atlas-spot-icon{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:12px;background:var(--card2);font-size:22px;color:var(--accent)}
.atlas-spot strong{display:block;font-size:16px}
.atlas-spot small{display:block;color:var(--muted);margin-top:3px}
.risk{font-size:11px;font-weight:900;letter-spacing:.08em;border-radius:999px;padding:5px 7px;border:1px solid var(--line)}
.risk-HIGH{color:#ffd4d4;border-color:#824b4b;background:#2c1b1b}
.risk-MED{color:#ffe7b0;border-color:#735f31;background:#292315}
.atlas-check{display:flex;gap:7px;overflow-x:auto;padding:2px 0 9px;scrollbar-width:none}
.atlas-check::-webkit-scrollbar{display:none}
.atlas-check span{white-space:nowrap;border:1px solid var(--line);background:var(--card2);border-radius:999px;padding:7px 10px;font-size:13px}
.atlas-check b{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:50%;background:var(--accent);color:#0d140f;margin-right:5px;font-size:11px}
.los-scene{border:1px solid var(--line);border-radius:16px;background:#0c120e;padding:14px;margin:12px 0}
.los-origin{border:2px solid var(--bad);background:#2a191b;border-radius:14px;padding:12px;text-align:center;font-weight:900}
.los-line{height:54px;display:flex;align-items:center;justify-content:center;position:relative;color:#7fc4ff;font-size:30px}
.los-line:before{content:'';position:absolute;top:5px;bottom:5px;width:4px;border-radius:99px;background:#4da8ff;opacity:.8}
.los-line span{position:relative;background:#0c120e;padding:0 8px;z-index:1;font-size:15px;font-weight:900}
.los-targets{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.los-target{border:1px solid #3a5b45;background:#16231a;border-radius:12px;padding:10px 6px;text-align:center;font-size:12px;display:flex;align-items:center;justify-content:center;min-height:52px}
.intel-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0}
.intel-box{border:1px solid var(--line);border-radius:14px;padding:13px;background:var(--card)}
.intel-box h3{font-size:13px;text-transform:uppercase;letter-spacing:.07em;margin:0 0 7px;color:var(--accent)}
.intel-box ul{margin:0;padding-left:20px}
.clear-stack{display:flex;flex-direction:column;gap:7px}
.clear-stack div{display:grid;grid-template-columns:27px 1fr;gap:8px;align-items:start;border:1px solid var(--line);border-radius:12px;padding:9px;background:var(--card2)}
.clear-stack b{display:flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:50%;background:var(--accent);color:#0d140f;font-size:12px}
.working-callout{color:var(--muted);font-size:12px}

</style>

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div><h1>Search & Destroy Companion</h1><small>Mid-game reference manual</small></div>
      <button class="iconbtn" onclick="showSearch()">⌕</button>
    </div>
  </header>
  <main id="main"></main>
  <footer class="legal-footer">© 2026 Michael Barnes · All Rights Reserved · <button class="navbtn" onclick="showAbout()">About</button></footer>
</div>

<div class="bottomnav">
  <div class="bottomnav-inner">
    <button class="navbtn active" data-tab="home" onclick="showHome()"><b>⌂</b>Home</button>
    <button class="navbtn" data-tab="browse" onclick="showBrowse()"><b>☰</b>Browse</button>
    <button class="navbtn" data-tab="practice" onclick="showPractice()"><b>◎</b>Practice</button>
    <button class="navbtn" data-tab="favorites" onclick="showFavorites()"><b>★</b>Saved</button>
    <button class="navbtn" data-tab="notes" onclick="showNotes()"><b>✎</b>Notes</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="maps.js"></script>
<script src="map_focus.js"></script>
<script src="map_action.js"></script>
<script src="map_atlas.js"></script>
<script>
const D = window.APP_DATA;
const APP_OWNER = 'Michael Barnes';
const APP_VERSION = '0.8';
const BUILD_ID = 'MB-SNDC-2026-0721-006';
const COPYRIGHT_NOTICE = 'Copyright © 2026 Michael Barnes. All Rights Reserved.';
const main = document.getElementById('main');
const $ = s => document.querySelector(s);
const state = {
  favorites: JSON.parse(localStorage.getItem('snd-favorites')||'[]'),
  notes: JSON.parse(localStorage.getItem('snd-notes')||'[]'),
  practice: JSON.parse(localStorage.getItem('snd-practice')||'null')
};
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setTab(name){document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name))}
function toast(msg){const t=$('#toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1400)}
function opById(id){return D.operations.find(o=>o.id===Number(id))}
function opRow(op){return `<button class="row" onclick="showOperation(${op.id})"><strong>${esc(op.title)}</strong><small>Operation ${String(op.id).padStart(2,'0')}</small></button>`}

function showHome(){
 setTab('home');
 main.innerHTML=`<section class="hero"><h2>What just happened?</h2><p>Tap the closest problem. The app will point you toward the useful page instead of making you remember chapter numbers like some kind of tactical librarian.</p></section>
 <div class="grid">${D.diagnosis.map(d=>`<button class="bigbtn" onclick='showDiagnosis(${JSON.stringify(d.label)})'><strong>${esc(d.label)}</strong><span>${d.ops.length} relevant operations</span></button>`).join('')}</div>
 <div class="section-title">Quick access</div>
 <div class="grid">
   <button class="bigbtn" onclick="showMapGuide()"><strong>Visual Map Guide</strong><span>Raid, Tunisia, Coastal</span></button>
   <button class="bigbtn" onclick="showDictionary()"><strong>Field Dictionary</strong><span>Find a term fast</span></button>
   <button class="bigbtn" onclick="showPractice()"><strong>Today's Practice</strong><span>One mission, not twelve</span></button>
   <button class="bigbtn" onclick="showBrowse()"><strong>All Operations</strong><span>Browse the field manual</span></button>
 </div>`;
 window.scrollTo(0,0);
}
function showDiagnosis(label){
 const d=D.diagnosis.find(x=>x.label===label);
 setTab('home');
 main.innerHTML=`<button class="action back" onclick="showHome()">← Back</button>
 <section class="operation-head"><div class="num">Quick diagnosis</div><h2>${esc(label)}</h2><p>Start with the first result. The others are nearby causes worth checking.</p></section>
 <div class="list">${d.ops.map(id=>opRow(opById(id))).join('')}</div>`;
 window.scrollTo(0,0);
}
function showBrowse(){
 setTab('browse');
 main.innerHTML=`<section class="hero"><h2>Browse by problem</h2><p>Titles first, numbers second. Civilization survives another minor interface improvement.</p></section>
 ${Object.entries(D.categories).map(([name,ids])=>`<div class="section-title">${esc(name)}</div><div class="list">${ids.map(id=>opRow(opById(id))).join('')}</div>`).join('')}
 <div class="section-title">Reference</div>
 <div class="list">
 <button class="row" onclick="showMapGuide()"><strong>Visual Map Guide</strong><small>Raid, Tunisia, Coastal</small></button>
 <button class="row" onclick="showDictionary()"><strong>Field Dictionary</strong><small>${D.dictionary.length} terms</small></button>
 </div>`;
 window.scrollTo(0,0);
}
function showOperation(id){
 const o=opById(id); setTab('browse');
 const fav=state.favorites.includes(id);
 main.innerHTML=`<button class="action back" onclick="history.back()">← Back</button>
 <section class="operation-head"><div class="num">Operation ${String(o.id).padStart(2,'0')}</div><h2>${esc(o.title)}</h2>
 <div class="actionbar">
 <button class="action ${fav?'active':''}" onclick="toggleFavorite(${id})">${fav?'★ Saved':'☆ Save'}</button>
 <button class="action" onclick="startPractice(${id})">◎ Practice this</button>
 </div></section>
 ${card('The Problem',o.problem)}
 ${card('The Truth',o.truth)}
 ${listCard('Common Causes',o.causes)}
 ${card('One Thing to Try',o.try)}
 ${card('Why It Helps',o.why)}
 ${card('Mission',o.mission)}
 ${listCard('Observe',o.observe)}
 ${card('Success Looks Like This',o.success)}
 <div class="card"><h3>Field Note</h3><textarea id="opnote" class="notearea" placeholder="What happened in the match?"></textarea><br><button class="action" onclick="saveOpNote(${id})">Save note</button></div>`;
 history.pushState({view:'op',id},'',`#op-${id}`);
 window.scrollTo(0,0);
}
function card(t,b){return `<div class="card"><h3>${esc(t)}</h3><p>${esc(b)}</p></div>`}
function listCard(t,arr){return `<div class="card"><h3>${esc(t)}</h3><ul>${arr.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`}
function toggleFavorite(id){
 const i=state.favorites.indexOf(id);
 if(i>=0)state.favorites.splice(i,1);else state.favorites.push(id);
 localStorage.setItem('snd-favorites',JSON.stringify(state.favorites));
 toast(i>=0?'Removed from saved':'Saved');
 showOperation(id);
}
function showFavorites(){
 setTab('favorites');
 const ops=state.favorites.map(opById).filter(Boolean);
 main.innerHTML=`<section class="hero"><h2>Saved Operations</h2><p>Your recurring trouble spots, gathered conveniently in one place like a tiny museum of avoidable deaths.</p></section>
 <div class="list">${ops.length?ops.map(opRow).join(''):'<div class="empty">No saved operations yet.</div>'}</div>`;
 window.scrollTo(0,0);
}
function startPractice(id){
 const o=opById(id);
 state.practice={id, rounds:0, remembered:0};
 localStorage.setItem('snd-practice',JSON.stringify(state.practice));
 toast('Practice mission started');
 showPractice();
}
function showPractice(){
 setTab('practice');
 if(!state.practice){
   main.innerHTML=`<section class="hero"><h2>Today's Practice</h2><p>Pick one mission. Improving everything simultaneously remains a charming human fantasy.</p></section>
   <div class="list">${D.operations.slice(0,8).map(o=>`<button class="row" onclick="startPractice(${o.id})"><strong>${esc(o.title)}</strong><small>${esc(o.mission)}</small></button>`).join('')}</div>`;
 } else {
   const o=opById(state.practice.id);
   const boxes=[0,1,2,3,4].map(i=>i<state.practice.rounds?'■':'□').join(' ');
   main.innerHTML=`<section class="operation-head"><div class="num">Today's focus</div><h2>${esc(o.title)}</h2></section>
   ${card('Mission',o.mission)}
   <div class="card"><h3>Progress</h3><p style="font-size:28px;letter-spacing:.15em">${boxes}</p><p>${state.practice.remembered} remembered out of ${state.practice.rounds} rounds</p>
   <div class="actionbar"><button class="action" onclick="recordRound(true)">Yes, remembered</button><button class="action" onclick="recordRound(false)">No, forgot</button></div></div>
   <button class="action" onclick="clearPractice()">End practice</button>`;
 }
 window.scrollTo(0,0);
}
function recordRound(ok){
 state.practice.rounds=Math.min(5,state.practice.rounds+1);
 if(ok)state.practice.remembered++;
 localStorage.setItem('snd-practice',JSON.stringify(state.practice));
 showPractice();
}
function clearPractice(){state.practice=null;localStorage.removeItem('snd-practice');showPractice()}
function saveOpNote(id){
 const text=$('#opnote').value.trim();
 if(!text)return;
 state.notes.unshift({id,text,date:new Date().toLocaleString()});
 localStorage.setItem('snd-notes',JSON.stringify(state.notes));
 toast('Note saved');
 $('#opnote').value='';
}
function showNotes(){
 setTab('notes');
 main.innerHTML=`<section class="hero"><h2>Field Notes</h2><p>Your observations live on this device.</p></section>
 <div class="list">${state.notes.length?state.notes.map((n,i)=>{const o=opById(n.id);return `<div class="card"><h3>${esc(o?o.title:'General note')}</h3><p>${esc(n.text)}</p><small style="color:var(--muted)">${esc(n.date)}</small><br><button class="action" onclick="deleteNote(${i})">Delete</button></div>`}).join(''):'<div class="empty">No field notes yet.</div>'}</div>`;
 window.scrollTo(0,0);
}
function deleteNote(i){state.notes.splice(i,1);localStorage.setItem('snd-notes',JSON.stringify(state.notes));showNotes()}

const MAPS = window.MAP_GUIDE_DATA;
const MAP_FOCUS = window.MAP_FOCUS_DATA;
const MAP_ACTIONS = window.MAP_ACTION_DATA;
const MAP_ATLAS = window.MAP_ATLAS_DATA;
let activeMapId = 'raid';
let activeFocusId = 'a';
let activeThreatName = null;

function showMapGuide(mapId=activeMapId){
 showMapHub(mapId);
}
function showMapHub(mapId=activeMapId){
 activeMapId=mapId;
 setTab('browse');
 const m=MAPS[mapId];
 const pack=MAP_ACTIONS[mapId];
 const order=['attack-a','defend-a','attack-b','defend-b','mid'];
 main.innerHTML=`<section class="hero"><span class="field-draft">General tactical reference</span><h2>${esc(m.name)} Map Guide</h2><p>Pick what you are doing. The next screen gives a four-step visual plan instead of asking you to decode a tiny blueprint while the round timer mocks you.</p></section>
 <div class="map-tabs">${Object.entries(MAPS).map(([id,x])=>`<button class="map-tab ${id===mapId?'active':''}" onclick="showMapHub('${id}')">${esc(x.name)}</button>`).join('')}</div>
 <p class="map-hub-note">Fast mode: choose a situation. Angle mode remains available inside every plan when you need the individual threats.</p>
 <button class="atlas-entry" onclick="showMapAtlas('${mapId}','a')"><strong>${esc(m.name)} Common Callout & Sightline Atlas →</strong><p>15 named positions across A, B, and Mid, with common aliases, sightlines, weak sides, and fast clears.</p></button>
 <div class="scenario-grid">${order.map(id=>{const p=pack.plans[id];return `<button class="scenario-btn" onclick="showMapPlan('${mapId}','${id}')"><span class="scenario-icon">${esc(p.icon)}</span><span><strong>${esc(p.title)}</strong><small>${esc(p.subtitle)}</small></span></button>`}).join('')}</div>
 <div class="section-title">Map warnings</div><div class="card"><ul>${m.warnings.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
 <div class="card"><h3>Field correction note</h3><textarea id="mapnote" class="notearea" placeholder="Wrong callout? Missed angle? Spot that keeps killing us?"></textarea><br><button class="action" onclick="saveMapNote('${mapId}')">Save map note</button></div>`;
 window.scrollTo(0,0);
}
function showMapPlan(mapId,planId){
 activeMapId=mapId;
 const m=MAPS[mapId];
 const p=MAP_ACTIONS[mapId].plans[planId];
 setTab('browse');
 main.innerHTML=`<button class="action back" onclick="showMapHub('${mapId}')">← ${esc(m.name)} situations</button>
 <section class="plan-banner"><span class="field-draft">Fast visual plan</span><h2>${esc(p.title)}</h2><p>${esc(p.subtitle)}</p></section>
 <div class="plan-goal"><div><strong>Goal</strong>${esc(p.goal)}</div><div><strong>Main danger</strong>${esc(p.danger)}</div></div>
 <div class="action-flow">${p.steps.map((step,i)=>`${i?'<div class="flow-arrow">↓</div>':''}<div class="action-step"><span class="step-number">${i+1}</span><div><h3>${esc(step.title)}</h3><p>${esc(step.text)}</p><small>${esc(step.micro)}</small></div></div>`).join('')}</div>
 <div class="card"><h3>Keep these on screen</h3><div class="watch-strip">${p.watch.map(x=>`<span class="watch-chip">◎ ${esc(x)}</span>`).join('')}</div></div>
 <div class="avoid-box"><strong>Do not:</strong> ${esc(p.avoid)}</div>
 <div class="plan-actions"><button class="action" onclick="showThreatGuide('${mapId}','${p.focus}')">Open angle view</button><button class="action" onclick="showMapHub('${mapId}')">Choose another situation</button></div>
 <div class="card"><h3>Field correction note</h3><textarea id="mapnote" class="notearea" placeholder="What happened when we tried this plan?"></textarea><br><button class="action" onclick="saveMapNote('${mapId}')">Save map note</button></div>`;
 window.scrollTo(0,0);
}
function showThreatGuide(mapId=activeMapId,focusId=activeFocusId){
 activeMapId=mapId;
 activeFocusId=focusId;
 activeThreatName=null;
 setTab('browse');
 const m=MAPS[mapId];
 const f=MAP_FOCUS[mapId][focusId];
 main.innerHTML=`<button class="action back" onclick="showMapHub('${mapId}')">← Fast plans</button>
 <section class="hero"><span class="field-draft">Fast angle reference</span><h2>${esc(m.name)} • ${esc(f.title)}</h2><p>${esc(f.summary)}</p></section>
 <div class="map-tabs">${Object.entries(MAPS).map(([id,x])=>`<button class="map-tab ${id===mapId?'active':''}" onclick="showThreatGuide('${id}','a')">${esc(x.name)}</button>`).join('')}</div>
 <div class="focus-tabs">
  <button class="focus-tab ${focusId==='a'?'active':''}" onclick="showThreatGuide('${mapId}','a')">A Site</button>
  <button class="focus-tab ${focusId==='b'?'active':''}" onclick="showThreatGuide('${mapId}','b')">B Site</button>
  <button class="focus-tab ${focusId==='mid'?'active':''}" onclick="showThreatGuide('${mapId}','mid')">Mid</button>
 </div>
 <p class="map-mode-note">The center is the area you are entering. The four cards are the main directions that can hurt you.</p>
 ${renderThreatBoard(mapId,focusId)}
 <div class="quick-rule"><strong>One rule:</strong> ${esc(f.quick)}</div>
 <div class="card"><h3>Clear order</h3><div class="clear-order">${f.order.map((x,i)=>`<span class="clear-step"><b>${i+1}</b>${esc(x)}</span>`).join('')}</div></div>
 <div id="threat-detail" class="card threat-detail"><h3>Tap a threat card</h3><p>It will show what that position watches and the simplest counter.</p></div>
 <div class="section-title">Quick warnings</div><div class="card"><ul>${m.warnings.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`;
 window.scrollTo(0,0);
}
function renderThreatBoard(mapId,focusId){
 const f=MAP_FOCUS[mapId][focusId];
 const byPos=Object.fromEntries(f.threats.map(t=>[t.pos,t]));
 const arrows={north:'↓',south:'↑',west:'→',east:'←'};
 const threat=(pos)=>{const t=byPos[pos]; return `<button class="threat-card threat-${pos}" onclick="showThreat('${mapId}','${focusId}',${JSON.stringify(t.name)})"><span class="direction">${arrows[pos]}</span><strong>${esc(t.icon+' '+t.name)}</strong><small>${esc(t.kind)}</small></button>`};
 return `<div class="threat-board">${threat('north')}${threat('west')}<div class="site-core"><div class="core-eye">◎</div><div class="core-label">${esc(f.center)}</div><small>You are here</small></div>${threat('east')}${threat('south')}</div>`;
}
function showThreat(mapId,focusId,name){
 const t=MAP_FOCUS[mapId][focusId].threats.find(x=>x.name===name); if(!t)return;
 activeThreatName=name;
 document.querySelectorAll('.threat-card').forEach(x=>x.classList.toggle('selected',x.textContent.includes(name)));
 const el=$('#threat-detail');
 el.innerHTML=`<h3>${esc(t.name)}</h3><p><span class="pill">${esc(t.kind)}</span></p><p><strong>What it watches:</strong> ${esc(t.watch)}</p><p><strong>Simple counter:</strong> ${esc(t.counter)}</p>`;
 el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function saveMapNote(mapId){const text=$('#mapnote').value.trim();if(!text)return;state.notes.unshift({id:0,text:`[${MAPS[mapId].name} map] ${text}`,date:new Date().toLocaleString()});localStorage.setItem('snd-notes',JSON.stringify(state.notes));$('#mapnote').value='';toast('Map note saved')}


function atlasPack(mapId){return MAP_ATLAS[mapId]}
function atlasGroup(mapId,id){return atlasPack(mapId).groups[id]}
function atlasSpot(mapId,groupId,spotId){return atlasGroup(mapId,groupId).spots.find(x=>x.id===spotId)}
function showMapAtlas(mapId='raid',groupId='a'){
 setTab('browse'); activeMapId=mapId;
 const pack=atlasPack(mapId), g=atlasGroup(mapId,groupId);
 main.innerHTML=`<button class="action back" onclick="showMapHub('${mapId}')">← ${esc(pack.map)} map guide</button>
 <section class="hero"><span class="field-draft">Common callout set</span><h2>${esc(pack.map)} Callouts & Sightlines</h2><p>${esc(pack.note)}</p></section>
 <div class="atlas-tabs">${Object.entries(pack.groups).map(([id,x])=>`<button class="atlas-tab ${groupId===id?'active':''}" onclick="showMapAtlas('${mapId}','${id}')">${esc(x.tab)}</button>`).join('')}</div>
 <div class="card"><h3>${esc(g.title)}</h3><p>${esc(g.subtitle)}</p><p class="working-callout"><strong>Research basis:</strong> ${esc(pack.basis)}</p><p class="working-callout">Use the main name first. Aliases are shown because squads apparently enjoy inventing dialects during gunfire.</p></div>
 <div class="section-title">Check order</div><div class="atlas-check">${g.checkOrder.map((x,i)=>`<span><b>${i+1}</b>${esc(x)}</span>`).join('')}</div>
 <div class="section-title">Named positions</div><div class="atlas-list">${g.spots.map(x=>`<button class="atlas-spot" onclick="showMapSpot('${mapId}','${groupId}','${x.id}')"><span class="atlas-spot-icon">${esc(x.icon)}</span><span><strong>${esc(x.name)}</strong><small>${x.aliases.length?`Also: ${esc(x.aliases.join(' / '))} · `:''}${esc(x.kind)}</small></span><span class="risk risk-${esc(x.risk)}">${esc(x.risk)}</span></button>`).join('')}</div>
 <div class="card"><h3>Your squad's alias</h3><textarea id="mapnote" class="notearea" placeholder="Different name your team actually uses? Save it here without replacing the common callout."></textarea><br><button class="action" onclick="saveMapNote('${mapId}')">Save ${esc(pack.map)} note</button></div>`;
 window.scrollTo(0,0);
}
function showMapSpot(mapId,groupId,spotId){
 const pack=atlasPack(mapId), g=atlasGroup(mapId,groupId), s=atlasSpot(mapId,groupId,spotId); if(!s)return;
 setTab('browse'); activeMapId=mapId;
 const targets=s.watches.slice(0,3);
 main.innerHTML=`<button class="action back" onclick="showMapAtlas('${mapId}','${groupId}')">← ${esc(g.title)} positions</button>
 <section class="operation-head"><div class="num">${esc(pack.map)} • ${esc(g.title)} • ${esc(s.basis)}</div><h2>${esc(s.icon+' '+s.name)}</h2><p><span class="pill">${esc(s.kind)}</span> <span class="risk risk-${esc(s.risk)}">${esc(s.risk)} RISK</span></p>${s.aliases.length?`<p class="working-callout"><strong>Also heard as:</strong> ${esc(s.aliases.join(' / '))}</p>`:''}</section>
 <div class="card"><h3>Where it sits</h3><p>${esc(s.position)}</p></div>
 <div class="los-scene" role="img" aria-label="${esc(s.name)} line of sight diagram">
  <div class="los-origin">${esc(s.name)}</div>
  <div class="los-line"><span>WATCHES ↓</span></div>
  <div class="los-targets">${targets.map(x=>`<div class="los-target">${esc(x)}</div>`).join('')}</div>
 </div>
 <div class="intel-grid">
  <div class="intel-box"><h3>What it watches</h3><ul>${s.watches.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
  <div class="intel-box"><h3>Where it is weak</h3><ul>${s.blind.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
  <div class="intel-box"><h3>Likely escape</h3><ul>${s.escape.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>
  <div class="intel-box"><h3>Line of sight</h3><p>${esc(s.line)}</p></div>
 </div>
 <div class="card"><h3>Fast clear</h3><div class="clear-stack">${s.clear.map((x,i)=>`<div><b>${i+1}</b><span>${esc(x)}</span></div>`).join('')}</div></div>
 <div class="avoid-box"><strong>Common mistake:</strong> ${esc(s.mistake)}</div>
 <div class="plan-actions"><button class="action" onclick="showMapAtlas('${mapId}','${groupId}')">Back to positions</button><button class="action" onclick="showMapPlan('${mapId}','${groupId==='a'?'attack-a':groupId==='b'?'attack-b':'mid'}')">Open matching plan</button></div>
 <div class="card"><h3>Squad note</h3><textarea id="mapnote" class="notearea" placeholder="Your team's alias, timing, or adjustment for this position"></textarea><br><button class="action" onclick="saveMapNote('${mapId}')">Save ${esc(pack.map)} note</button></div>`;
 window.scrollTo(0,0);
}

function showDictionary(){
 setTab('browse');
 main.innerHTML=`<section class="hero"><h2>Field Dictionary</h2><p>Search the term you heard before pretending everybody else already knew it.</p></section>
 <input class="search" id="dictq" placeholder="Search terms..." oninput="filterDictionary()">
 <div id="dictlist" class="list" style="margin-top:12px">${dictRows(D.dictionary)}</div>`;
 window.scrollTo(0,0);
}
function dictRows(items){return items.map(x=>`<div class="card"><h3>${esc(x.term)}</h3><p>${esc(x.definition)}</p></div>`).join('')}
function filterDictionary(){
 const q=$('#dictq').value.toLowerCase();
 $('#dictlist').innerHTML=dictRows(D.dictionary.filter(x=>(x.term+' '+x.definition).toLowerCase().includes(q)));
}
function showSearch(){
 setTab('');
 main.innerHTML=`<section class="hero"><h2>Search</h2><p>Search titles, problems, missions, and dictionary terms.</p></section>
 <input class="search" id="searchq" placeholder="Type what happened..." autofocus oninput="runSearch()">
 <div id="results" class="list" style="margin-top:12px"></div>`;
 setTimeout(()=>$('#searchq').focus(),50);
}
function runSearch(){
 const q=$('#searchq').value.toLowerCase().trim();
 if(!q){$('#results').innerHTML='';return}
 const ops=D.operations.filter(o=>JSON.stringify(o).toLowerCase().includes(q)).slice(0,12);
 const terms=D.dictionary.filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,8);
 const maps=Object.entries(MAPS).filter(([id,x])=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,3);
 const atlasSpots=Object.entries(MAP_ATLAS).flatMap(([mapId,p])=>Object.entries(p.groups).flatMap(([groupId,g])=>g.spots.map(s=>({mapId,mapName:p.map,groupId,...s})))).filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,12);
 $('#results').innerHTML=ops.map(opRow).join('')+atlasSpots.map(x=>`<button class="row" onclick="showMapSpot('${x.mapId}','${x.groupId}','${x.id}')"><strong>${esc(x.mapName)} • ${esc(x.name)}</strong><small>${x.aliases.length?`Also: ${esc(x.aliases.join(' / '))} · `:''}${esc(x.kind)}</small></button>`).join('')+maps.map(([id,x])=>`<button class="row" onclick="showMapGuide('${id}')"><strong>${esc(x.name)} Visual Map</strong><small>Callouts, camp spots, lines of sight, routes</small></button>`).join('')+terms.map(x=>`<div class="card"><h3>${esc(x.term)}</h3><p>${esc(x.definition)}</p></div>`).join('');
}

 setTab('');
 main.innerHTML=`<button class="action back" onclick="history.back()">← Back</button>
 <section class="operation-head"><div class="num">About this app</div><h2>Search & Destroy Companion</h2></section>
 <div class="about-logo">S&amp;D</div>

 <div class="card"><h3>Authorship fingerprint</h3><p class="legal-box">Project ID: SEARCH-DESTROY-COMPANION-MB\nBuild ID: ${esc(BUILD_ID)}\nOwner: ${esc(APP_OWNER)}</p></div>`;
 window.scrollTo(0,0);

window.addEventListener('popstate',e=>{ if(e.state?.view==='op')showOperation(e.state.id); else showHome(); });
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
const previewMode=new URLSearchParams(location.search).get('preview');
if(previewMode==='atlas-raid')showMapAtlas('raid','a');else if(previewMode==='atlas-tunisia')showMapAtlas('tunisia','a');else if(previewMode==='atlas-coastal')showMapAtlas('coastal','a');else if(previewMode==='spot-zig')showMapSpot('raid','mid','zig');else showHome();
